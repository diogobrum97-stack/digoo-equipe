    const refBtn = document.createElement("button");
    refBtn.textContent = "↻";
    refBtn.style.cssText = "background:none;border:1px solid var(--border2);color:var(--text3);border-radius:3px;padding:2px 7px;font-size:10px;cursor:pointer;";
    refBtn.addEventListener("click", () => { estoqueBlingData = null; fetchBlingProdutos(); });
    blingStatus.appendChild(refBtn);
    const renewBtn = document.createElement("button");
    renewBtn.textContent = "Renovar token";
    renewBtn.style.cssText = "background:none;border:1px solid #fbbf2444;color:#fbbf2488;border-radius:3px;padding:2px 8px;font-size:9px;cursor:pointer;letter-spacing:1px;margin-left:4px;";
    renewBtn.addEventListener("click", () => window.open("https://digoo-backend.vercel.app/api/bling-auth", "_blank"));
    blingStatus.appendChild(renewBtn);
  } else {
    blingStatus.innerHTML = `<span style="color:var(--text3)">Bling desconectado</span>`;
    const connectBtn = document.createElement("button");
    connectBtn.textContent = "Conectar";
    connectBtn.style.cssText = "background:none;border:1px solid var(--border2);color:var(--text3);border-radius:3px;padding:2px 8px;font-size:9px;cursor:pointer;letter-spacing:1px;";
    connectBtn.addEventListener("click", () => fetchBlingProdutos());
    blingStatus.appendChild(connectBtn);
    const authBtn = document.createElement("button");
    authBtn.textContent = "Autorizar Bling";
    authBtn.style.cssText = "background:none;border:1px solid #fbbf2466;color:#fbbf24;border-radius:3px;padding:2px 8px;font-size:9px;cursor:pointer;letter-spacing:1px;margin-left:4px;";
    authBtn.addEventListener("click", () => window.open("https://digoo-backend.vercel.app/api/bling-auth", "_blank"));
    blingStatus.appendChild(authBtn);
  }
  conexoesWrap.appendChild(blingStatus);

  // Status ML Filial (necessário pro acompanhamento de vendas reais após mudança de preço)
  const mlFilialWrap = document.createElement("div");
  mlFilialWrap.style.cssText = "display:flex;align-items:center;gap:6px;font-size:9px;";
  if(state.ml_token_filial?.access_token){
    const nick = state.ml_token_filial.nickname ? ` · ${state.ml_token_filial.nickname}` : "";
    mlFilialWrap.innerHTML = `<span style="color:#00dfc3">●</span><span style="color:var(--text3)">ML Filial${nick}</span>`;
    const reconBtn = document.createElement("button");
    reconBtn.textContent = "Reconectar";
    reconBtn.style.cssText = "background:none;border:1px solid var(--border2);color:var(--text3);border-radius:3px;padding:2px 8px;font-size:9px;cursor:pointer;letter-spacing:1px;margin-left:4px;";
    reconBtn.addEventListener("click", () => window.open(`${VERCEL_BACKEND}/api/ml-auth?conta=filial`, "_blank"));
    mlFilialWrap.appendChild(reconBtn);
  }else{
    mlFilialWrap.innerHTML = `<span style="color:var(--text3)">ML Filial desconectado</span>`;
    const connBtn = document.createElement("button");
    connBtn.textContent = "Conectar ML Filial";
    connBtn.style.cssText = "background:none;border:1px solid #fff15566;color:#fff155;border-radius:3px;padding:2px 8px;font-size:9px;cursor:pointer;letter-spacing:1px;margin-left:4px;";
    connBtn.addEventListener("click", () => window.open(`${VERCEL_BACKEND}/api/ml-auth?conta=filial`, "_blank"));
    mlFilialWrap.appendChild(connBtn);
  }
  conexoesWrap.appendChild(mlFilialWrap);

  topRow.appendChild(conexoesWrap);
  panel.appendChild(topRow);

  if (!estoqueExcelData || !estoqueExcelData.rows || estoqueExcelData.rows.length === 0) {
    const empty = document.createElement("div");
    empty.style.cssText = "text-align:center;padding:40px 0;color:var(--text3);font-size:11px;";
    if (estoqueAutoLoading) {
      empty.innerHTML = '<span class="spinning">↻</span> Buscando estoque do Full automaticamente...';
    } else if (estoqueAutoErro) {
      empty.innerHTML = `Erro ao buscar estoque automático: ${estoqueAutoErro}<br><span style="font-size:10px;">Tente importar a planilha manualmente enquanto isso.</span>`;
    } else if (state.ml_token_filial?.access_token) {
      empty.textContent = "Nenhum item encontrado no Full ainda.";
    } else {
      empty.textContent = "Conecte o ML Filial (acima) pra puxar o estoque automaticamente, ou importe a planilha Full ML manualmente.";
    }
    panel.appendChild(empty);
    return;
  }

  const rows = estoqueExcelData.rows.filter(r => (r.aptas || 0) > 0 || (r.transf || 0) > 0);

  // ── Cards resumo ─────────────────────────────────────────────
  const resumo = document.createElement("div");
  resumo.style.cssText = "display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;";
  let totalValor = 0, totalAptas = 0, totalTransf = 0, skusSemCusto = 0;
  const temCusto = rows.some(r => estoqueBlingData && estoqueBlingData[normSku(r.sku)]);
  const enriched = rows.map(r => {
    const custo = estoqueBlingData ? (estoqueBlingData[normSku(r.sku)] || 0) : null;
    const valor = custo !== null ? r.aptas * custo : null;
    if (custo === 0 || custo === null) skusSemCusto++;
    if (valor !== null) totalValor += valor;
    totalAptas += r.aptas;
    totalTransf += (r.transf || 0);
    return { ...r, custo, valor };
  });

  [
    { label:"VALOR EM ESTOQUE", value: estoqueBlingData ? `R$ ${totalValor.toLocaleString("pt-BR",{minimumFractionDigits:2})}` : "—", color:"#00dfc3", sub: skusSemCusto > 0 ? `${skusSemCusto} SKUs sem custo` : "todos com custo" },
    { label:"UNIDADES APTAS", value: totalAptas.toLocaleString("pt-BR"), color:"#378ADD", sub:`${rows.length} SKUs` },
    { label:"EM TRANSFERÊNCIA", value: totalTransf.toLocaleString("pt-BR"), color:"#fbbf24", sub:"entre centros do Full" },
    { label:"TOTAL NO FULL", value: (totalAptas+totalTransf).toLocaleString("pt-BR"), color:"#7F77DD", sub:"aptas + transferência" },
  ].forEach(s => {
    const card = document.createElement("div");
    card.style.cssText = `background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 16px;border-top:2px solid ${s.color};`;
    card.innerHTML = `<div style="font-size:10px;color:var(--text3);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;">${s.label}</div><div style="font-size:24px;font-weight:600;color:${s.color};text-shadow:0 0 16px ${s.color}66;">${s.value}</div><div style="font-size:11px;color:var(--text3);margin-top:4px;">${s.sub}</div>`;
    resumo.appendChild(card);
  });
  panel.appendChild(resumo);

  // ── Sub-abas Estoque / Saúde ──────────────────────────────────
  if (!window._estoqueSubTab) window._estoqueSubTab = "estoque";
  const subTabWrap = document.createElement("div");
  subTabWrap.style.cssText = "display:flex;border-bottom:1px solid var(--sep);margin-bottom:14px;";
  ["estoque","saude"].forEach(st => {
    const btn = document.createElement("button");
    const active = window._estoqueSubTab === st;
    btn.style.cssText = `padding:7px 14px;background:none;border:none;font-family:inherit;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:${active?"var(--text)":"var(--text3)"};border-bottom:2px solid ${active?"var(--text)":"transparent"};margin-bottom:-1px;transition:all 0.15s;`;
    btn.textContent = st === "estoque" ? "Estoque" : "Saúde";
    btn.addEventListener("click", () => { window._estoqueSubTab = st; render(); });
    subTabWrap.appendChild(btn);
  });
  panel.appendChild(subTabWrap);

  if (window._estoqueSubTab !== "saude") {
    // ── Tabela estoque ───────────────────────────────────────────
    const tableWrap = document.createElement("div");
    tableWrap.style.cssText = "overflow-x:auto;";
    const table = document.createElement("table");
    table.style.cssText = "width:100%;border-collapse:collapse;";
    table.innerHTML = `<thead><tr style="border-bottom:1px solid var(--sep);">
      <th style="text-align:left;padding:6px 8px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1.5px;">SKU</th>
      <th style="text-align:left;padding:6px 8px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1.5px;">PRODUTO</th>
      <th style="text-align:center;padding:6px 8px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1.5px;">APTAS</th>
      <th style="text-align:center;padding:6px 8px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1.5px;">TRANSF</th>
      <th style="text-align:center;padding:6px 8px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1.5px;">PEND</th>
      <th style="text-align:right;padding:6px 8px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1.5px;">CUSTO</th>
      <th style="text-align:right;padding:6px 8px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1.5px;">VALOR</th>
    </tr></thead><tbody id="estoque-tbody"></tbody>`;
    tableWrap.appendChild(table);
    panel.appendChild(tableWrap);

    const tbody = table.querySelector("#estoque-tbody");
    enriched.forEach(r => {
      const semCusto = !r.custo;
      const custoStr = r.custo > 0 ? `R$ ${r.custo.toLocaleString("pt-BR",{minimumFractionDigits:2})}` : `<span style="color:#f87171;font-size:9px;">sem custo</span>`;
      const valorStr = r.valor > 0 ? `R$ ${r.valor.toLocaleString("pt-BR",{minimumFractionDigits:2})}` : "—";
      const tr = document.createElement("tr");
      tr.style.borderBottom = "1px solid var(--sep2)";
      tr.innerHTML = `
        <td style="padding:8px 8px;color:#e8e8e8;font-size:11px;white-space:nowrap;font-weight:600;">${r.sku}</td>
        <td style="padding:8px 8px;color:var(--text2);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;">${r.produto}</td>
        <td style="padding:8px 8px;text-align:center;color:${r.aptas>0?"var(--text)":"var(--text3)"};font-weight:${r.aptas>0?"500":"400"};">${r.aptas||"—"}</td>
        <td style="padding:8px 8px;text-align:center;color:var(--text3);">${r.transf||"—"}</td>
        <td style="padding:8px 8px;text-align:center;color:${r.pendente>0?"#fbbf24":"var(--text3)"};font-weight:${r.pendente>0?"500":"400"};">${r.pendente||"—"}</td>
        <td style="padding:8px 8px;text-align:right;color:${semCusto?"#f87171":"var(--text2)"};">${custoStr}</td>
        <td style="padding:8px 8px;text-align:right;color:${semCusto?"var(--text3)":r.valor>5000?"#00dfc3":r.valor>1000?"#00dfc3":"var(--text2)"};font-weight:500;">${valorStr}</td>`;
      tbody.appendChild(tr);
    });

    if (skusSemCusto > 0 && estoqueBlingData) {
      const warn = document.createElement("div");
      warn.style.cssText = "margin-top:12px;padding:8px 12px;background:#f8711408;border:1px solid #f8711422;border-radius:5px;font-size:10px;color:#f87171;";
      warn.textContent = `⚠ ${skusSemCusto} SKUs sem custo no Bling — verifique o campo "Preço de Custo" no cadastro do produto.`;
      panel.appendChild(warn);
    }
  } else {
    // ── Saúde (filial SP) ────────────────────────────────────────
    renderSaudeChart(panel, enriched.filter(r => r.aptas > 0));
  }
}

function renderMatrizRS(panel, color) {
  // ── Linha superior: trocar relatório (esquerda) + ML Matriz (direita) ──
  const topRow = document.createElement("div");
  topRow.style.cssText = "display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px;";

  const uploadWrap = document.createElement("div");
  uploadWrap.style.cssText = "display:flex;align-items:center;gap:10px;flex-wrap:wrap;";

  const uploadLabel = document.createElement("label");
  uploadLabel.style.cssText = `display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:none;border:1px dashed ${color}66;border-radius:5px;color:${color};font-size:10px;letter-spacing:1.5px;cursor:pointer;`;
  uploadLabel.innerHTML = `<span>↑</span><span>Trocar relatório</span>`;
  const fileInput = document.createElement("input");
  fileInput.type = "file"; fileInput.accept = ".xlsx,.xls"; fileInput.style.display = "none";
  fileInput.addEventListener("change", async e => {
    const file = e.target.files[0]; if (!file) return;
    matrizFileName = file.name;
    try {
      matrizRows = await processarRelatorioMatriz(file);
      render();
    } catch(err) {
      console.error("Erro ao ler relatório:", err);
    }
  });
  uploadLabel.appendChild(fileInput);
  uploadWrap.appendChild(uploadLabel);

  if (matrizFileName) {
    const fn = document.createElement("span");
    fn.style.cssText = "font-size:9px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px;";
    fn.textContent = matrizFileName;
    uploadWrap.appendChild(fn);
  }
  topRow.appendChild(uploadWrap);

  // Status ML Matriz
  const mlMatrizWrap = document.createElement("div");
  mlMatrizWrap.style.cssText = "display:flex;align-items:center;gap:6px;font-size:9px;";
  if(state.ml_token?.access_token){
    const nick = state.ml_token.nickname ? ` · ${state.ml_token.nickname}` : "";
    mlMatrizWrap.innerHTML = `<span style="color:#00dfc3">●</span><span style="color:var(--text3)">ML Matriz${nick}</span>`;
    const reconBtn = document.createElement("button");
    reconBtn.textContent = "Reconectar";
    reconBtn.style.cssText = "background:none;border:1px solid var(--border2);color:var(--text3);border-radius:3px;padding:2px 8px;font-size:9px;cursor:pointer;letter-spacing:1px;margin-left:4px;";
    reconBtn.addEventListener("click", () => window.open(`${VERCEL_BACKEND}/api/ml-auth?conta=matriz`, "_blank"));
    mlMatrizWrap.appendChild(reconBtn);
  }else{
    mlMatrizWrap.innerHTML = `<span style="color:var(--text3)">ML Matriz desconectado</span>`;
    const connBtn = document.createElement("button");
    connBtn.textContent = "Conectar ML Matriz";
    connBtn.style.cssText = "background:none;border:1px solid #fff15566;color:#fff155;border-radius:3px;padding:2px 8px;font-size:9px;cursor:pointer;letter-spacing:1px;margin-left:4px;";
    connBtn.addEventListener("click", () => window.open(`${VERCEL_BACKEND}/api/ml-auth?conta=matriz`, "_blank"));
    mlMatrizWrap.appendChild(connBtn);
  }
  topRow.appendChild(mlMatrizWrap);

  panel.appendChild(topRow);

  if (!matrizRows || matrizRows.length === 0) {
    const empty = document.createElement("div");
    empty.style.cssText = "text-align:center;padding:40px 0;color:var(--text3);font-size:11px;";
    empty.textContent = "Importe o relatório de estoque do Bling (Matriz RS)";
    panel.appendChild(empty);
    return;
  }

  // ── Cards resumo Matriz ──────────────────────────────────────
  const totalValor = matrizRows.reduce((s,r) => s + r.valor, 0);
  const totalQty   = matrizRows.reduce((s,r) => s + r.qty, 0);
  const custoMedio = totalQty > 0 ? totalValor / totalQty : 0;
  const resumo = document.createElement("div");
  resumo.style.cssText = "display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;";
  [
    { label:"VALOR EM ESTOQUE", value:`R$ ${totalValor.toLocaleString("pt-BR",{minimumFractionDigits:2})}`, color:"#00dfc3", sub:`${matrizRows.length} SKUs` },
    { label:"UNIDADES", value: totalQty.toLocaleString("pt-BR"), color:"#378ADD", sub:"peças" },
    { label:"CUSTO MÉDIO/UN", value:`R$ ${custoMedio.toLocaleString("pt-BR",{minimumFractionDigits:2})}`, color:"#7F77DD", sub:"ponderado" },
  ].forEach(s => {
    const card = document.createElement("div");
    card.style.cssText = `background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 16px;border-top:2px solid ${s.color};`;
    card.innerHTML = `<div style="font-size:10px;color:var(--text3);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;">${s.label}</div><div style="font-size:24px;font-weight:600;color:${s.color};text-shadow:0 0 16px ${s.color}66;">${s.value}</div><div style="font-size:11px;color:var(--text3);margin-top:4px;">${s.sub}</div>`;
    resumo.appendChild(card);
  });
  panel.appendChild(resumo);

  // ── Sub-abas Estoque / Saúde Matriz ──────────────────────────
  if (!window._matrizSubTab) window._matrizSubTab = "estoque";
  const subTabWrap = document.createElement("div");
  subTabWrap.style.cssText = "display:flex;border-bottom:1px solid var(--sep);margin-bottom:14px;";
  ["estoque","saude"].forEach(st => {
    const btn = document.createElement("button");
    const active = window._matrizSubTab === st;
    btn.style.cssText = `padding:7px 14px;background:none;border:none;font-family:inherit;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:${active?"var(--text)":"var(--text3)"};border-bottom:2px solid ${active?"var(--text)":"transparent"};margin-bottom:-1px;transition:all 0.15s;`;
    btn.textContent = st === "estoque" ? "Estoque" : "Saúde";
    btn.addEventListener("click", () => { window._matrizSubTab = st; render(); });
    subTabWrap.appendChild(btn);
  });
  panel.appendChild(subTabWrap);

  if (window._matrizSubTab !== "saude") {
    // ── Tabela estoque Matriz ────────────────────────────────────
    const tableWrap = document.createElement("div");
    tableWrap.style.cssText = "overflow-x:auto;";
    const table = document.createElement("table");
    table.style.cssText = "width:100%;border-collapse:collapse;";
    table.innerHTML = `<thead><tr style="border-bottom:1px solid var(--sep);">
      <th style="text-align:left;padding:6px 8px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1.5px;">SKU</th>
      <th style="text-align:left;padding:6px 8px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1.5px;">PRODUTO</th>
      <th style="text-align:center;padding:6px 8px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1.5px;">QTD</th>
      <th style="text-align:right;padding:6px 8px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1.5px;">CUSTO</th>
      <th style="text-align:right;padding:6px 8px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1.5px;">VALOR</th>
    </tr></thead><tbody></tbody>`;
    tableWrap.appendChild(table);
    panel.appendChild(tableWrap);

    const tbody = table.querySelector("tbody");
    [...matrizRows].sort((a,b) => b.valor - a.valor).forEach(r => {
      const tr = document.createElement("tr");
      tr.style.borderBottom = "1px solid var(--sep2)";
      tr.innerHTML = `
        <td style="padding:8px 8px;color:#e8e8e8;font-size:11px;white-space:nowrap;font-weight:600;">${r.sku}</td>
        <td style="padding:8px 8px;color:var(--text2);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;">${r.produto}</td>
        <td style="padding:8px 8px;text-align:center;color:${r.qty>0?"var(--text)":"var(--text3)"};font-weight:${r.qty>0?"500":"400"};">${r.qty||"—"}</td>
        <td style="padding:8px 8px;text-align:right;color:var(--text2);">${r.custo>0?`R$ ${r.custo.toLocaleString("pt-BR",{minimumFractionDigits:2})}`:"—"}</td>
        <td style="padding:8px 8px;text-align:right;color:${r.valor>5000?"#00dfc3":r.valor>1000?"#00dfc3":"var(--text2)"};font-weight:500;">${r.valor>0?`R$ ${r.valor.toLocaleString("pt-BR",{minimumFractionDigits:2})}`:"—"}</td>`;
      tbody.appendChild(tr);
    });
  } else {
    // ── Saúde Matriz ─────────────────────────────────────────────
    // Usa vendas da filial SP como referência de giro
    const filialVendas = {};
    if (estoqueExcelData?.rows) {
      estoqueExcelData.rows.forEach(r => { filialVendas[r.sku] = r.vendas30 || 0; });
    }
    const matrizEnriched = matrizRows.map(r => ({
      ...r,
      aptas: r.qty,
      vendas30: filialVendas[r.sku] || 0,
      custo: r.custo,
      valor: r.valor,
    }));
    renderSaudeChart(panel, matrizEnriched.filter(r => (r.aptas||r.qty||0) > 0));
  }
}

function renderSaudeChart(panel, enriched) {
  const saudeWrap = document.createElement("div");
  saudeWrap.style.cssText = "font-family:system-ui,-apple-system,sans-serif;";

  // Legenda
  const leg = document.createElement("div");
  leg.style.cssText = "display:flex;gap:14px;margin-bottom:14px;font-size:10px;flex-wrap:wrap;";
  [{c:"#00ffb8",l:"<15d — subir"},{c:"#ffcc00",l:"15–90d — acompanhar"},{c:"#ff3d3d",l:">90d — baixar"}].forEach(({c,l}) => {
    const s = document.createElement("span");
    s.style.cssText = "display:flex;align-items:center;gap:4px;color:var(--text3);";
    s.innerHTML = '<span style="width:8px;height:8px;border-radius:2px;background:' + c + ';display:inline-block;flex-shrink:0;"></span>' + l;
    leg.appendChild(s);
  });
  saudeWrap.appendChild(leg);

  // Grade de chips
  const grade = document.createElement("div");
  grade.style.cssText = "display:flex;flex-wrap:wrap;gap:6px;";

  // Card de detalhe (aparece abaixo da grade)
  const detWrap = document.createElement("div");

  const saudeRows = [...enriched].map(r => {
    const vendas30 = Number(r.vendas30) || 0;
    const aptas = Number(r.aptas || r.qty || 0);
    const dias = vendas30 > 0 ? Math.round(aptas / (vendas30 / 30)) : 999;
    return {...r, vendas30, aptas, dias};
  }).sort((a,b) => b.dias - a.dias);

  const cor = d => d.dias <= 15 ? "#00ffb8" : d.dias <= 90 ? "#ffcc00" : "#ff3d3d";
  const categoriaKey = d => d.dias <= 15 ? "verde" : d.dias <= 90 ? "amarelo" : "vermelho";
  const badgeText = d => d.dias <= 15 ? "↑ SUBIR" : d.dias <= 90 ? "~ ACOMPANHAR" : "↓ BAIXAR";
  const diasLabel = d => d.dias >= 999 ? "sem vendas" : d.dias + "d";

  let activeChip = null;
  let activeDet = null;

  saudeRows.forEach(d => {
    const c = cor(d);
    const skuKey = String(d.sku).replace(/[.#$\[\]\/]/g, "_"); // Firebase não aceita esses caracteres em chaves
    const catAtual = categoriaKey(d);
    const registro = state.categoria_saude?.[skuKey];
    let mostrarPonto = false;
    if (!registro) {
      // primeira vez vendo esse SKU — só grava a categoria atual como referência, sem marcar mudança
      set(ref(db, `/categoria_saude/${skuKey}`), { categoria: catAtual, vista: true });
    } else if (registro.categoria !== catAtual) {
      // categoria mudou desde a última vez — marca como não visto ainda
      set(ref(db, `/categoria_saude/${skuKey}`), { categoria: catAtual, vista: false });
      mostrarPonto = true;
    } else if (registro.vista === false) {
      mostrarPonto = true;
    }

    const chip = document.createElement("div");
    chip.style.cssText = "position:relative;display:flex;flex-direction:column;gap:3px;padding:8px 10px;border-radius:6px;border:1px solid " + c + "28;border-top:2px solid " + c + ";background:linear-gradient(135deg," + c + "18 0%,#161616 65%);cursor:pointer;min-width:110px;transition:all 0.15s;";
    chip.innerHTML =
      (mostrarPonto ? '<div style="position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:' + c + ';box-shadow:0 0 4px ' + c + ';"></div>' : '') +
      '<div style="font-size:9px;color:' + c + ';font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;">' + d.sku + '</div>' +
      '<div style="font-size:12px;font-weight:600;color:' + c + ';">' + diasLabel(d) + '</div>' +
      '<div style="font-size:9px;color:#aaa;">R$' + Math.round(d.valor / 1000) + 'k · ' + d.vendas30 + '/mês</div>';

    chip.addEventListener("click", () => {
      if (mostrarPonto) update(ref(db, `/categoria_saude/${skuKey}`), { vista: true });
      if (activeDet) activeDet.remove();
      if (activeChip) activeChip.style.outline = "none";
      if (activeChip === chip) { activeChip = null; activeDet = null; return; }

      chip.style.outline = "2px solid " + c;
      activeChip = chip;

      const msg = d.dias >= 999
        ? "Nenhuma venda nos últimos 30 dias. Avalie promoção ou liquidação."
        : d.dias >= 90
        ? "Com " + d.vendas30 + " vendas/mês e " + d.aptas + " un, leva ~" + d.dias + " dias pra zerar. Considere reduzir o preço."
        : d.dias <= 15
        ? "Acabando rápido. Dura só " + d.dias + " dias. Considere subir o preço ou antecipar reposição."
        : "Giro equilibrado. Com " + d.vendas30 + " vendas/mês dura ~" + d.dias + " dias.";

      const det = document.createElement("div");
      det.style.cssText = "margin-top:12px;padding:12px 16px;background:var(--bg3);border-left:3px solid " + c + ";border-radius:0 8px 8px 0;";
      det.innerHTML =
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;">' +
          '<div style="font-size:13px;font-weight:600;color:' + c + ';">' + d.sku + '</div>' +
          '<span style="background:' + c + '22;color:' + c + ';border:1px solid ' + c + '55;border-radius:4px;padding:3px 10px;font-size:10px;letter-spacing:1px;font-weight:500;">' + badgeText(d) + '</span>' +
        '</div>' +
        '<div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:10px;">' +
          '<div><div style="font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:3px;">VALOR EM ESTOQUE</div><div style="font-size:16px;font-weight:600;color:' + c + ';">' + (d.valor > 0 ? "R$ " + d.valor.toLocaleString("pt-BR") : "—") + '</div></div>' +
          '<div><div style="font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:3px;">VENDAS 30D</div><div style="font-size:16px;font-weight:500;color:var(--text);">' + d.vendas30 + ' un</div></div>' +
          '<div><div style="font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:3px;">DIAS ESTOQUE</div><div style="font-size:16px;font-weight:600;color:' + c + ';">' + diasLabel(d) + '</div></div>' +
          '<div><div style="font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:3px;">UNIDADES</div><div style="font-size:16px;font-weight:500;color:var(--text);">' + d.aptas + '</div></div>' +
        '</div>' +
        '<div style="font-size:12px;color:var(--text3);line-height:1.6;font-family:system-ui,sans-serif;">' + msg + '</div>';

      const priceSection = document.createElement("div");
      priceSection.style.cssText = "margin-top:14px;padding-top:12px;border-top:1px solid var(--sep);";
      const pc = state.price_changes && state.price_changes[d.sku];
      const mlFilialOn = !!state.ml_token_filial?.access_token;

      function buildRealSalesBlock(){
        const wrap = document.createElement("div");
        const header = document.createElement("div");
        header.style.cssText = "font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:8px;";
        header.textContent = "VENDAS REAIS NO ML DESDE A MUDANÇA";
        wrap.appendChild(header);
        const statsRow = document.createElement("div");
        statsRow.style.cssText = "display:flex;align-items:center;gap:20px;flex-wrap:wrap;";
        wrap.appendChild(statsRow);
        const actionsRow = document.createElement("div");
        actionsRow.style.cssText = "margin-top:8px;";
        wrap.appendChild(actionsRow);
        const listWrap = document.createElement("div");
        listWrap.style.cssText = "display:none;margin-top:10px;padding-top:10px;border-top:1px dashed var(--sep);max-height:220px;overflow-y:auto;";
        wrap.appendChild(listWrap);
        let listaCarregada = false;
        let ultimoRdata = null;

        const buscar = async () => {
          statsRow.innerHTML = '<span class="spinning" style="color:var(--text3)">↻</span> <span style="color:var(--text3);font-size:11px;">Consultando Mercado Livre...</span>';
          actionsRow.innerHTML = "";
          try{
            const fromISO = new Date(pc.changedAt).toISOString();
            const url = `${VERCEL_BACKEND}/api/ml-vendas?token=${state.ml_token_filial.access_token}&sku=${encodeURIComponent(d.sku)}&from=${encodeURIComponent(fromISO)}`;
            const r = await fetch(url);
            const rdata = await r.json();
            ultimoRdata = rdata;
            if(!r.ok || rdata.error){
              statsRow.innerHTML = `<span style="color:#f87171;font-size:11px;">Erro: ${rdata.error||"falha na consulta"}</span>`;
              return;
            }
            const m = rdata.skuMatch;
            if(!m || m.qty===0){
              const lista = rdata.skusVendidosNoPeriodo || [];
              const norm = s => String(s||"").toLowerCase().replace(/[^a-z0-9]/g,"");
              const skuNorm = norm(d.sku);
              const parecidos = lista.filter(s => skuNorm.length>=6 && (norm(s).includes(skuNorm.slice(0,6)) || skuNorm.includes(norm(s).slice(0,6))));
              let extra = "";
              if(parecidos.length){
                extra = ' <span style="color:#fbbf24;">⚠ achei SKU parecido nas vendas: ' + parecidos.join(", ") + '</span>';
              }
              statsRow.innerHTML = '<span style="color:var(--text3);font-size:11px;">Nenhuma venda registrada desde a mudança.' + extra + '</span>';
            }else{
              statsRow.innerHTML =
                '<div><div style="font-size:9px;color:var(--text3);">UNIDADES</div><div style="font-size:15px;font-weight:600;color:#fff155;">' + m.qty + '</div></div>' +
                '<div><div style="font-size:9px;color:var(--text3);">FATURAMENTO</div><div style="font-size:15px;font-weight:600;color:#fff155;">R$ ' + m.revenue.toLocaleString("pt-BR",{minimumFractionDigits:2}) + '</div></div>';
              const toggleBtn = document.createElement("button");
              toggleBtn.textContent = "Ver lista";
              toggleBtn.style.cssText = "background:none;border:1px solid var(--border2);color:var(--text3);border-radius:4px;padding:3px 10px;font-size:10px;cursor:pointer;font-family:inherit;letter-spacing:0.5px;";
              toggleBtn.addEventListener("click", () => {
                const vis = listWrap.style.display !== "none";
                if(vis){ listWrap.style.display = "none"; toggleBtn.textContent = "Ver lista"; return; }
                toggleBtn.textContent = "Esconder lista";
                listWrap.style.display = "block";
                if(!listaCarregada){
                  listaCarregada = true;
                  const itens = ultimoRdata.skuVendasDetalhe || [];
                  if(!itens.length){
                    listWrap.innerHTML = '<span style="font-size:11px;color:var(--text3);">Sem detalhe disponível.</span>';
                  }else{
                    listWrap.innerHTML = itens.map(v => {
                      const dt = new Date(v.date).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});
                      return '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--sep);font-size:11px;">' +
                        '<span style="color:var(--text3);">' + dt + '</span>' +
                        '<span>' + v.qty + ' un</span>' +
                        '<span style="color:var(--text2);">R$ ' + v.total.toLocaleString("pt-BR",{minimumFractionDigits:2}) + '</span>' +
                      '</div>';
                    }).join("");
                  }
                }
              });
              actionsRow.appendChild(toggleBtn);
            }
          }catch(err){
            statsRow.innerHTML = `<span style="color:#f87171;font-size:11px;">Erro de conexão: ${err.message}</span>`;
          }
        };
        buscar(); // busca automática ao abrir o card, sem precisar clicar
        return wrap;
      }

      if(pc){
        const diasDesde = Math.max(1, Math.round((Date.now()-pc.changedAt)/86400000));
        const info = document.createElement("div");
        info.style.cssText = "margin-bottom:10px;";
        if(pc.priceBefore!=null && pc.priceAfter!=null){
          const subiu = Number(pc.priceAfter) > Number(pc.priceBefore);
          const precoColor = subiu ? "#00dfc3" : "#00606c";
          info.innerHTML =
            '<div style="font-size:9px;color:var(--text3);letter-spacing:1px;margin-bottom:6px;">MUDANÇA DE PREÇO · há ' + diasDesde + 'd</div>' +
            '<div style="font-size:15px;">R$ ' + Number(pc.priceBefore).toFixed(2) + ' <span style="color:var(--text3);">→</span> <span style="color:' + precoColor + ';font-weight:600;">R$ ' + Number(pc.priceAfter).toFixed(2) + '</span></div>';
        }else{
          info.innerHTML = '<div style="font-size:9px;color:var(--text3);letter-spacing:1px;">MUDANÇA DE PREÇO · há ' + diasDesde + 'd</div>';
        }
        priceSection.appendChild(info);

        if(mlFilialOn){
          priceSection.appendChild(buildRealSalesBlock());
        }else{
          const hint = document.createElement("div");
          hint.style.cssText = "font-size:10px;color:var(--text3);line-height:1.5;";
          hint.textContent = "Conecte o ML Filial (no topo da aba) pra ver as vendas reais desde essa mudança.";
          priceSection.appendChild(hint);
        }
      }else if(mlFilialOn){
        const hint = document.createElement("div");
        hint.style.cssText = "font-size:10px;color:var(--text3);line-height:1.5;";
        hint.textContent = "Assim que o preço desse SKU mudar no Mercado Livre, o painel detecta sozinho na próxima vez que você abrir a aba Estoque.";
        priceSection.appendChild(hint);
      }else{
        const markBtn = document.createElement("button");
        markBtn.textContent = "📌 Marquei mudança de preço agora";
        markBtn.style.cssText = `background:none;border:1px dashed ${c}66;color:${c};border-radius:5px;padding:7px 12px;font-size:10px;cursor:pointer;font-family:inherit;letter-spacing:1px;width:100%;`;
        markBtn.addEventListener("click",()=>{set(ref(db,`/price_changes/${d.sku}`),{vendas30AtChange:d.vendas30,changedAt:Date.now(),changedBy:currentUser});});
        priceSection.appendChild(markBtn);
        const hint = document.createElement("div");
        hint.style.cssText = "font-size:10px;color:var(--text3);margin-top:6px;line-height:1.5;";
        hint.textContent = "Conecte o ML Filial (no topo da aba) pra isso ficar automático.";
        priceSection.appendChild(hint);
      }
      det.appendChild(priceSection);

      detWrap.appendChild(det);
      activeDet = det;
    });

    grade.appendChild(chip);
  });

  saudeWrap.appendChild(grade);
  saudeWrap.appendChild(detWrap);
  panel.appendChild(saudeWrap);
}



// ── FECHAMENTO MENSAL ────────────────────────────────────────────────────────
let fechamentoMes = new Date().toISOString().slice(0, 7); // "2026-07"
let fechamentoData = null;   // resultado do buscar
let fechamentoLoading = false;
let fechamentoErro = null;
// Sobrescritas manuais por fornecedor: { cnpj: { confirmado: bool, fileId: string, fileName: string, fileLocal: File } }
let fechamentoOverrides = {};

async function fetchFechamento(mes) {
  if(fechamentoLoading) return;
  fechamentoLoading = true; fechamentoErro = null; fechamentoData = null;
  // Atualiza só o spinner sem chamar render() geral
  const p = document.getElementById("fechamento-panel");
  if(p) {
    p.innerHTML = "";
    const l = document.createElement("div");
    l.style.cssText = "text-align:center;padding:40px 0;color:var(--text3);font-size:12px;";
    l.innerHTML = '<span class="spinning">↻</span> Buscando NFS-e no Gmail e Drive...';
    p.appendChild(l);
  }
  try {
    const r = await fetch(`${VERCEL_BACKEND}/api/google?action=buscar&mes=${mes}`);
    const d = await r.json();
    if(!r.ok || !d.ok) throw new Error(d.error || "falha ao buscar");
    fechamentoData = d;
  } catch(e) {
    fechamentoErro = e.message;
  }
  fechamentoLoading = false;
  const p2 = document.getElementById("fechamento-panel");
  if(p2){ p2.innerHTML=""; renderFechamentoMensal(p2, themeColor("Diogo")); }
}

function renderFechamentoMensal(panel, color) {
  const MESES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const [ano, mesNum] = fechamentoMes.split("-");
  const nomeMes = `${MESES[Number(mesNum)-1]} ${ano}`;

  // Header
  const header = document.createElement("div");
  header.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;";

  const monthWrap = document.createElement("div");
  monthWrap.style.cssText = "display:flex;align-items:center;gap:8px;";

  const prevBtn = document.createElement("button");
  prevBtn.textContent = "‹";
  prevBtn.style.cssText = "background:none;border:1px solid var(--border2);color:var(--text2);border-radius:4px;padding:2px 10px;cursor:pointer;font-size:18px;";
  prevBtn.addEventListener("click", () => {
    const [y, m] = fechamentoMes.split("-").map(Number);
    fechamentoMes = `${m===1?y-1:y}-${String(m===1?12:m-1).padStart(2,"0")}`;
    fechamentoData = null; fechamentoOverrides = {};
    const p = document.getElementById("fechamento-panel");
    if(p){ p.innerHTML=""; renderFechamentoMensal(p, color); }
  });

  const monthLabel = document.createElement("span");
  monthLabel.style.cssText = "font-size:14px;font-weight:600;color:var(--text);min-width:120px;text-align:center;";
  monthLabel.textContent = nomeMes;

  const nextBtn = document.createElement("button");
  nextBtn.textContent = "›";
  nextBtn.style.cssText = "background:none;border:1px solid var(--border2);color:var(--text2);border-radius:4px;padding:2px 10px;cursor:pointer;font-size:18px;";
  nextBtn.addEventListener("click", () => {
    const [y, m] = fechamentoMes.split("-").map(Number);
    fechamentoMes = `${m===12?y+1:y}-${String(m===12?1:m+1).padStart(2,"0")}`;
    fechamentoData = null; fechamentoOverrides = {};
    const p = document.getElementById("fechamento-panel");
    if(p){ p.innerHTML=""; renderFechamentoMensal(p, color); }
  });

  monthWrap.appendChild(prevBtn); monthWrap.appendChild(monthLabel); monthWrap.appendChild(nextBtn);

  const rightWrap = document.createElement("div");
  rightWrap.style.cssText = "display:flex;gap:8px;align-items:center;";

  const uploadLabel = document.createElement("label");
  uploadLabel.style.cssText = `display:inline-flex;align-items:center;gap:5px;padding:6px 14px;background:none;border:1px dashed ${color}66;border-radius:5px;color:${color};font-size:10px;cursor:pointer;font-family:inherit;letter-spacing:1px;`;
  uploadLabel.textContent = "↑ Importar planilha";
  const fileInput = document.createElement("input");
  fileInput.type = "file"; fileInput.accept = ".csv,.xlsx,.xls"; fileInput.style.display = "none";
  fileInput.addEventListener("change", async e => {
    const file = e.target.files[0]; if(!file) return;
    await processarPlanilhaFechamento(file, null, nomeMes, color);
  });
  uploadLabel.appendChild(fileInput);
  rightWrap.appendChild(uploadLabel);
  header.appendChild(monthWrap); header.appendChild(rightWrap);
  panel.appendChild(header);

  // Dados
  const dadosSalvos = state.fechamentos?.[fechamentoMes.replace("-","_")];
  const notas = fechamentoData?.notas || dadosSalvos?.notas || [];
  const savedAt = dadosSalvos?.savedAt;

  if(notas.length === 0) {
    const info = document.createElement("div");
    info.style.cssText = "text-align:center;padding:50px 20px;color:var(--text3);font-size:11px;line-height:2.2;";
    info.innerHTML = `Faça o consolidado de NFS-e aqui no chat e exporte como planilha.<br>Depois clique em <strong style="color:${color}">↑ Importar planilha</strong> para conferir e salvar.`;
    panel.appendChild(info);
    return;
  }

  if(savedAt) {
    const statusBar = document.createElement("div");
    statusBar.style.cssText = "font-size:9px;color:var(--text3);margin-bottom:12px;text-align:right;letter-spacing:0.5px;";
    statusBar.textContent = `✓ Salvo em ${new Date(savedAt).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}`;
    panel.appendChild(statusBar);
  }

  const notasState = notas.map((nf, i) => ({ ...nf, _idx: i, _removido: false }));

  function parseValorStr(v) {
    const s = String(v||"").trim().replace(/\s/g,"");
    if (!s) return 0;
    if (s.includes(",") && s.lastIndexOf(",") > s.lastIndexOf("."))
      return parseFloat(s.replace(/\./g,"").replace(",",".")) || 0;
    return parseFloat(s.replace(",","")) || 0;
  }

  function fmtValor(v) {
    const n = parseValorStr(v);
    return n > 0 ? n.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}) : "";
  }

  const cardsWrap = document.createElement("div");
  cardsWrap.style.cssText = "display:flex;flex-direction:column;gap:10px;margin-bottom:10px;";
  panel.appendChild(cardsWrap);

  function inpClean(val, placeholder, cor, mono) {
    const inp = document.createElement("input");
    const vazio = !val || String(val).toUpperCase().includes("NÃO") || String(val) === "—";
    inp.value = vazio ? "" : (val || "");
    inp.placeholder = vazio ? "⚠ preencher" : (placeholder || "");
    inp.style.cssText = `background:none;border:none;border-bottom:1px solid ${vazio?"#f8717144":"transparent"};color:${vazio?"#f87171":(cor||"var(--text)")};font-family:${mono?"var(--font-mono, monospace)":"inherit"};font-size:inherit;padding:0;outline:none;width:100%;`;
    inp.addEventListener("focus", () => inp.style.borderBottomColor = color);
    inp.addEventListener("blur",  () => { inp.style.borderBottomColor = "transparent"; if(inp.value) inp.style.color = cor||"var(--text)"; });
    return inp;
  }

  function renderCards() {
    cardsWrap.innerHTML = "";
    const ativas = notasState.filter(nf => !nf._removido);
    let total = 0;

    ativas.forEach(nf => {
      const valNum = parseValorStr(nf.valor);
      const semValor = !nf.valor || parseValorStr(nf.valor) === 0;
      total += valNum;

      const card = document.createElement("div");
      card.style.cssText = `background:var(--bg3);border:1px solid ${semValor?"#fbbf2444":"var(--border)"};border-radius:10px;padding:14px 16px;`;

      // Linha topo: nome + valor
      const topo = document.createElement("div");
      topo.style.cssText = "display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:12px;";

      const nomeWrap = document.createElement("div");
      nomeWrap.style.cssText = "flex:1;min-width:0;";
      const iNome = inpClean(nf.fornecedor, "Prestador", "var(--text)");
      iNome.style.cssText += "font-size:13px;font-weight:600;";
      iNome.addEventListener("input", () => { nf.fornecedor = iNome.value; });
      const iCnpj = inpClean(nf.cnpj, "CNPJ", "var(--text3)", true);
      iCnpj.style.cssText += "font-size:10px;margin-top:2px;";
      iCnpj.addEventListener("input", () => { nf.cnpj = iCnpj.value; });
      nomeWrap.appendChild(iNome); nomeWrap.appendChild(iCnpj);

      const valorWrap = document.createElement("div");
      valorWrap.style.cssText = "text-align:right;flex-shrink:0;";
      const vLabel = document.createElement("div");
      vLabel.style.cssText = "font-size:10px;color:var(--text3);margin-bottom:2px;";
      vLabel.textContent = "Valor";
      const iValWrap = document.createElement("div");
      iValWrap.style.cssText = "display:flex;align-items:baseline;gap:3px;justify-content:flex-end;";
      const rSign = document.createElement("span");
      rSign.style.cssText = "font-size:11px;color:var(--text3);";
      rSign.textContent = "R$";
      const iVal = inpClean(fmtValor(nf.valor), "0,00", semValor?"#fbbf24":"#4ade80");
      iVal.style.cssText += `font-size:15px;font-weight:600;text-align:right;width:90px;color:${semValor?"#fbbf24":"#4ade80"};`;
      iVal.addEventListener("input", () => {
        nf.valor = iVal.value;
        iVal.style.color = "#4ade80";
        card.style.borderColor = "var(--border)";
        atualizarTotal();
      });
      iValWrap.appendChild(rSign); iValWrap.appendChild(iVal);
      valorWrap.appendChild(vLabel); valorWrap.appendChild(iValWrap);

      topo.appendChild(nomeWrap); topo.appendChild(valorWrap);
      card.appendChild(topo);

      // Linha detalhes: NF · Serviço · Emissão
      const detalhes = document.createElement("div");

// ── Parser planilha de fechamento ────────────────────────────
async function processarPlanilhaFechamento(file, fbKey, nomeMes, color) {
  try {
    const XLSX = await import("https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm");
    const arrayBuffer = await file.arrayBuffer();
    const wb   = XLSX.read(arrayBuffer, { type:"array" });
    const ws   = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });

    // Acha linha do cabeçalho — tem "Fornecedor" e "CNPJ"
    let headerIdx = -1;
    for (let i = 0; i < rows.length; i++) {
      const row = rows[i].map(c => String(c||"").toLowerCase());
      if (row.some(c => c.includes("fornecedor") || c.includes("prestador")) &&
          row.some(c => c.includes("cnpj"))) {
        headerIdx = i; break;
      }
    }
    if (headerIdx === -1) { alert("Cabeçalho não encontrado. Verifique se a planilha tem colunas Fornecedor e CNPJ."); return; }

    const headers = rows[headerIdx].map(h => String(h||"").toLowerCase().trim());
    const col = (...kws) => headers.findIndex(h => kws.some(k => h.includes(k)));

    const cForn = col("fornecedor","prestador");
    const cCnpj = col("cnpj");
    const cNum  = col("nº nota","nota","nº","nf");
    const cServ = col("serviço","servi","histórico","historico","descri");
    const cVal  = col("valor");
    const cEmis = col("emissão","emiss","data");

    function parseValorCell(v) {
      // Suporta 1234.56, 1.234,56, 1234,56
      const s = String(v||"").replace(/[^\d,\.]/g,"").trim();
      if (!s) return "";
      // Se tem vírgula depois de ponto: formato 1.234,56
      if (s.includes(",") && s.lastIndexOf(",") > s.lastIndexOf(".")) {
        return s.replace(/\./g,"").replace(",",".");
      }
      return s.replace(",",".");
    }

    const notas = [];
    for (let i = headerIdx + 1; i < rows.length; i++) {
      const row  = rows[i];
      const forn = String(row[cForn] ?? "").trim();
      const cnpj = cCnpj >= 0 ? String(row[cCnpj] ?? "").trim() : "";
      const val  = cVal  >= 0 ? parseValorCell(row[cVal]) : "";

      // Pula linhas vazias, subtotais e totais
      if (!forn) continue;
      if (/^(total|subtotal)/i.test(forn)) continue;
      if (!cnpj && !val) continue; // linha de título/header duplicado

      notas.push({
        fornecedor: forn,
        cnpj,
        numero:  cNum  >= 0 ? String(row[cNum]  ?? "").trim() : "",
        servico: cServ >= 0 ? String(row[cServ] ?? "").trim() : "",
        valor:   val,
        emissao: cEmis >= 0 ? String(row[cEmis] ?? "").trim() : "",
      });
    }

    if (notas.length === 0) { alert("Nenhuma nota encontrada. Verifique o formato da planilha."); return; }

    fechamentoData = { notas };
    const p = document.getElementById("fechamento-panel");
    if(p){ p.innerHTML=""; renderFechamentoMensal(p, color); }
  } catch(e) {
    alert("Erro ao ler planilha: " + e.message);
  }
}

async function processarPlanilhaAtributos(file, statusEl, color) {
  try {
    const XLSX = await import("https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm");
    const ab = await file.arrayBuffer();
    const wb = XLSX.read(ab, { type:"array" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });

    // Detecta separador — tenta ler como CSV com ponto e vírgula
    const text = new TextDecoder().decode(ab);
    const linhas = text.trim().split("\n");
    const sep = linhas[0].includes(";") ? ";" : ",";
    const header = linhas[0].split(sep).map(h => h.trim().toUpperCase());
    const iCusto = header.indexOf("CUSTO");
    const iImposto = header.indexOf("IMPOSTO");
    const iSku = header.indexOf("SKU");

    if(iCusto < 0 || iSku < 0) throw new Error("Colunas CUSTO e SKU não encontradas");

    const atributos = {};
    linhas.slice(1).forEach(linha => {
      const cols = linha.split(sep);
      const sku = (cols[iSku]||"").trim();
      const custo = parseFloat((cols[iCusto]||"0").replace(",",".")) || 0;
      const imposto = parseFloat((cols[iImposto]||"0").replace(",",".")) || 0;
      if(sku) atributos[sku] = { custo, imposto };
    });

    const total = Object.keys(atributos).length;
    await set(ref(db, "/config_atributos"), { atributos, total, atualizadoEm: Date.now() });
    statusEl.innerHTML = `<span style="color:#00dfc3;">✓ ${total} SKUs importados com sucesso</span>`;
  } catch(e) {
    statusEl.innerHTML = `<span style="color:#f87171;">Erro: ${e.message}</span>`;
  }
}

async function processarPlanilhaKits(file, statusEl, color) {
  try {
    const text = await file.text();
    // Remove BOM e aspas duplas dos headers
    const linhas = text.trim().split(/\r?\n/);
    const sep = linhas[0].includes(";") ? ";" : ",";
    const header = linhas[0].replace(/^\ufeff/, "").split(sep).map(h => h.trim().replace(/^"|"$/g, "").toLowerCase());

    const iKitSku  = header.findIndex(h => h.includes("código da composição") || h.includes("codigo da composicao"));
    const iCompSku = header.findIndex(h => h.includes("código do componente") || h.includes("codigo do componente"));
    const iQtd     = header.findIndex(h => h.includes("quantidade"));

    if(iKitSku < 0 || iCompSku < 0) throw new Error(`Colunas não encontradas. Headers detectados: ${header.join(", ")}`);

    // Carrega composições existentes para detectar novos
    const snapExist = await get(ref(db, "/config_kits/composicoes"));
    const composicoesExistentes = snapExist.val() || {};

    const composicoes = {};
    linhas.slice(1).forEach(linha => {
      if(!linha.trim()) return;
      const cols = linha.split(sep).map(c => c.trim().replace(/^"|"$/g, ""));
      const kitSku  = (cols[iKitSku]  || "").trim();
      const compSku = (cols[iCompSku] || "").trim();
      const qtdStr  = (cols[iQtd]     || "1").trim();
      const qtd     = parseFloat(qtdStr.replace(",", ".")) || 1;
      if(!kitSku || !compSku || compSku === "nan") return;
      if(!composicoes[kitSku]) composicoes[kitSku] = [];
      composicoes[kitSku].push({ sku: compSku, qtd });
    });

    const novos = Object.keys(composicoes).filter(k => !composicoesExistentes[k]);
    const alterados = Object.keys(composicoes).filter(k => {
      if(!composicoesExistentes[k]) return false;
      return JSON.stringify(composicoes[k]) !== JSON.stringify(composicoesExistentes[k]);
    });

    const total = Object.keys(composicoes).length;
    await set(ref(db, "/config_kits"), { composicoes, total, atualizadoEm: Date.now() });

    let msg = `<span style="color:#00dfc3;">✓ ${total} kits importados</span>`;
    if(novos.length) msg += ` <span style="color:#fbbf24;">· ${novos.length} novo(s): ${novos.join(", ")}</span>`;
    if(alterados.length) msg += ` <span style="color:#60a5fa;">· ${alterados.length} alterado(s)</span>`;
    statusEl.innerHTML = msg;

    const p = document.querySelector("#diogo-panel");
    if(p && window._diogotab === "config") { p.innerHTML=""; renderConfig(p, color); }
  } catch(e) {
    statusEl.innerHTML = `<span style="color:#f87171;">Erro: ${e.message}</span>`;
  }
}

// ── Gera CSV de atributos atualizado com CMPs calculados ─────────────────────
async function gerarCSVAtributos(custosMedios) {
  try {
    // Pega composições de kits e atributos base do state
    const composicoes = state.config_kits?.composicoes || {};
    const atribBase   = state.config_atributos?.atributos || {};

    if (!Object.keys(atribBase).length) {
      alert("Importe a planilha de atributos na aba Config primeiro.");
      return;
    }

    // Mapa de CMP por SKU (normalizado lowercase)
    const cmpPorSku = {};
    Object.values(custosMedios).forEach(v => {
      if(v.sku && v.novoCmp) cmpPorSku[v.sku.toLowerCase()] = v.novoCmp;
    });

    // Calcula custo dos kits a partir dos componentes
    function calcularCustoKit(kitSku) {
      const comps = composicoes[kitSku];
      if (!comps) return null;
      let total = 0;
      for (const c of comps) {
        const cmp = cmpPorSku[c.sku.toLowerCase()];
        if (cmp == null) return null; // componente sem CMP conhecido
        total += c.qtd * cmp;
      }
      return total;
    }

    // Monta CSV — atualiza SKUs com CMP calculado
    const linhas = ["CUSTO;IMPOSTO;SKU"];
    const skusProcessados = new Set();

    Object.entries(atribBase).forEach(([sku, dados]) => {
      const skuLower = sku.toLowerCase();
      skusProcessados.add(sku);

      // Verifica se é unitário com CMP
      let novoCusto = cmpPorSku[skuLower] ?? null;

      // Verifica se é kit
      if (novoCusto == null) {
        novoCusto = calcularCustoKit(sku);
      }

      const custo = novoCusto != null
        ? novoCusto.toFixed(2).replace(".", ",")
        : String(dados.custo || "0").replace(".", ",");
      const imposto = String(dados.imposto || "0").replace(".", ",");
      linhas.push(`${custo};${imposto};${sku}`);
    });

    // Adiciona SKUs com CMP que não estavam na planilha base
    Object.values(custosMedios).forEach(v => {
      if(v.sku && !skusProcessados.has(v.sku) && !skusProcessados.has(v.sku.toLowerCase())) {
        const custo = v.novoCmp.toFixed(2).replace(".", ",");
        linhas.push(`${custo};0,00;${v.sku}`);
      }
    });

    const csv = "\uFEFF" + linhas.join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `atributos_custos_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert("Erro ao gerar CSV: " + e.message);
  }
}

document.getElementById("user-label").addEventListener("click",()=>{localStorage.removeItem(STORAGE_KEY);currentUser=null;const s=document.getElementById("identity-screen");s.innerHTML="";s.style.display="flex";setupIdentityScreen();});

const urlParams=new URLSearchParams(window.location.search);
if(urlParams.get("ml_connected")==="1"){window.history.replaceState({},"",window.location.pathname);}
if(urlParams.get("ml_error")){alert("Erro ao conectar ML: "+urlParams.get("ml_error"));window.history.replaceState({},"",window.location.pathname);}

setupIdentityScreen();
setInterval(()=>{ try{ render(); }catch(e){} }, 5*60*1000); // mantém os badges de "atrasada" atualizados
</script>

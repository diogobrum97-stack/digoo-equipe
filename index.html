const ALIQUOTAS_IPI = { "29319029":0, "73181500":0.065, "83021000":0.0975, "84145990":0, "84733019":0.065, "84733090":0.065 };
function getAliquotaIPI(ncm){
  const n=String(ncm||"").replace(/\D/g,"");
  let extra = state.aliquotas_ipi_extra?.[n];
  if(extra!=null){
    // Segurança: alíquota de IPI nunca chega a 100% na prática — se alguém
    // digitou "9.75" pensando em porcentagem (em vez de 0.0975 em fração),
    // corrige sozinho dividindo por 100.
    if(extra>1) extra = extra/100;
    return { valor:extra, conhecido:true };

  return n in ALIQUOTAS_IPI ? { valor:ALIQUOTAS_IPI[n], conhecido:true } : { valor:0, conhecido:false };
}

// Decodifica o timestamp embutido no ID gerado pelo push() do Firebase,
// usado como fallback pra tarefas antigas que não têm createdAt salvo.
function decodePushId(id){
  const PUSH_CHARS = "-0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ_abcdefghijklmnopqrstuvwxyz";
  if(!id || id.length<8) return null;
  let ts = 0;
  for(let i=0;i<8;i++){
    const idx = PUSH_CHARS.indexOf(id[i]);
    if(idx<0) return null;
    ts = ts*64 + idx;
  }
  return ts;
}
function taskCreatedAt(task){
  if(task.createdAt) return task.createdAt;
  const decoded = task.id ? decodePushId(task.id) : null;
  return decoded || null;
}
function taskOverdueLabel(task){
  if(!task || task.done) return null;
  const budgetH = BUDGET_HORAS[task.prio];
  if(!budgetH) return null;
  const createdAt = taskCreatedAt(task);
  if(!createdAt) return null;
  const elapsedH = (Date.now()-createdAt)/3600000;
  if(elapsedH <= budgetH) return null;
  return elapsedH < 24 ? `ATRASADA HÁ ${Math.round(elapsedH)}H` : `ATRASADA HÁ ${Math.round(elapsedH/24)}D`;
}
function overdueBadgeHtml(task){

let prevTasks={},flashQueue={},completionAlerts={},openCard=null,diogoPinUnlocked=false,diogoAutoFullscreen=false,diogoCardFullscreen=false,tabFlashInterval=null,faviconInterval=null;

onValue(ref(db,"/"),snap=>{
  const d=snap.val()||{};
  d.tasks=d.tasks||{};d.messages=d.messages||{};d.flashes=d.flashes||{};d.notices=d.notices||{};d.ml_token=d.ml_token||null;d.ml_cache=d.ml_cache||null;d.price_changes=d.price_changes||{};d.ml_token_filial=d.ml_token_filial||null;d.last_known_prices=d.last_known_prices||{};d.nfes_processadas=d.nfes_processadas||{};d.categoria_saude=d.categoria_saude||{};d.aliquotas_ipi_extra=d.aliquotas_ipi_extra||{};d.precos_venda_manual=d.precos_venda_manual||{};d.ordem_tarefas=d.ordem_tarefas||[];d.google_token=d.google_token||null;d.fechamentos=d.fechamentos||{};d.config_atributos=d.config_atributos||null;d.config_kits=d.config_kits||null;

function addTask(member,text,prio,sender){
  setSyncing(true);push(ref(db,"/tasks"),{member,text,prio,done:false,delegatedBy:sender||null,createdAt:Date.now()});
  if(member!=="Diogo"){const from=sender||"Diogo";set(ref(db,`/flashes/${member}`),{ts:Date.now(),msg:`Nova tarefa de ${from}!`});startTabFlash(`Tarefa delegada para ${member}!`,themeColor(member));}
  else if(member==="Diogo"&&sender)set(ref(db,`/flashes/Diogo`),{ts:Date.now(),msg:`Nova tarefa de ${sender}!`});
}
function toggleTask(id,done,progress,isRecorrente){
  setSyncing(true);
  if(done){
    // concluído -> pendente (só via botão reabrir para recorrentes)
    if(!isRecorrente){
      update(ref(db,`/tasks/${id}`),{done:false,progress:false});
    }
    return;
  } else if(progress){
    // progresso -> concluído
    update(ref(db,`/tasks/${id}`),{done:true,progress:false});
  } else {
    // pendente -> em progresso
    update(ref(db,`/tasks/${id}`),{done:false,progress:true});
    return;
  }
  if(!done){
    const task=state.tasks&&state.tasks[id];
    if(task&&task.delegatedBy&&task.delegatedBy!=="Diogo"&&task.delegatedBy!==task.member){
      push(ref(db,"/notices"),{forMember:task.delegatedBy,text:task.text,by:task.member,ts:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),ts_raw:Date.now()});
      set(ref(db,`/flashes/${task.delegatedBy}`),{ts:Date.now(),msg:`${task.member} concluiu sua tarefa!`});
    }
    setTimeout(()=>{Object.entries(state.messages||{}).forEach(([msgId,msg])=>{if(msg!=null&&msg.taskId===id)update(ref(db,`/messages/${msgId}`),{closed:true});});},30000);
  }
}

  push(ref(db,"/messages"),{from,text,taskId,taskText,recipient:rcpt,delegatedBy:delegatedBy||null,read:false,ts:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}),ts_raw:Date.now()});
  set(ref(db,`/flashes/${rcpt}`),{ts:Date.now(),msg:`Mensagem de ${from}!`});
}

function msgsFor(name){return Object.entries(state.messages).filter(([,m])=>m!=null&&m.from===name).map(([id,m])=>({...m,id})).sort((a,b)=>b.ts_raw-a.ts_raw);}

function makeIcon(color,size){const c=document.createElement("canvas");c.width=c.height=size;const ctx=c.getContext("2d");const r=size/2;ctx.shadowColor=color;ctx.shadowBlur=size*0.25;ctx.beginPath();ctx.arc(r,r,r*0.75,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();return c.toDataURL();}
function sendNotif(title,body,color){if(!("Notification"in window)||Notification.permission!=="granted")return;const n=new Notification(title,{body,icon:makeIcon(color,64),tag:"digoo-task",requireInteraction:true});n.onclick=()=>{window.focus();n.close();};}
function setFavicon(color){const c=document.createElement("canvas");c.width=c.height=32;const ctx=c.getContext("2d");ctx.shadowColor=color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(16,16,12,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.shadowBlur=0;ctx.beginPath();ctx.arc(16,16,6,0,Math.PI*2);ctx.fillStyle="#fff";ctx.globalAlpha=0.5;ctx.fill();ctx.globalAlpha=1;let l=document.querySelector("link[rel*='icon']");if(!l){l=document.createElement("link");l.rel="icon";document.head.appendChild(l);}l.href=c.toDataURL();}
function resetFavicon(){const c=document.createElement("canvas");c.width=c.height=32;const ctx=c.getContext("2d");ctx.beginPath();ctx.arc(16,16,12,0,Math.PI*2);ctx.fillStyle="#333";ctx.fill();let l=document.querySelector("link[rel*='icon']");if(!l){l=document.createElement("link");l.rel="icon";document.head.appendChild(l);}l.href=c.toDataURL();}

async function fetchMLData(tab){
  mlLoadingTab=tab;render();
  try{
    const token=state.ml_token?.access_token;
    if(!token){
      if(tab==="canceladas")mlCanceladas={error:"token ausente"};
      else if(tab==="devolucoes")mlDevolucoes={error:"token ausente"};
      else if(tab==="reclamacoes")mlReclamacoes={error:"token ausente"};
      mlLoadingTab=null;render();return;
    }
    const r=await fetch(`${VERCEL_BACKEND}/api/ml-${tab}?token=${token}`);
    const data=await r.json();
    if(tab==="canceladas")mlCanceladas=data;
    else if(tab==="devolucoes")mlDevolucoes=data;
    else if(tab==="reclamacoes")mlReclamacoes=data;
  }catch(e){
    if(tab==="canceladas")mlCanceladas={error:e.message};
    else if(tab==="devolucoes")mlDevolucoes={error:e.message};
    else if(tab==="reclamacoes")mlReclamacoes={error:e.message};
  }
  mlLoadingTab=null;render();
}

async function checkAndCreateRecorrentes() {
  if(recorrentesChecked) return;
  recorrentesChecked = true;

  try {
    const hoje = new Date().toISOString().slice(0,10); // "2026-06-16"
    const logKey = `recorrentes_log/${hoje.replace(/-/g,"_")}`;

    // Verifica se já criou hoje
    const logSnap = await new Promise(resolve => {
      const ref2 = ref(db, logKey);
      onValue(ref2, snap => resolve(snap.val()), { onlyOnce: true });
    });
    if(logSnap) return; // já criou hoje

    // Busca recorrentes configuradas
    const recSnap = await new Promise(resolve => {
      const ref2 = ref(db, "/recorrentes");
      onValue(ref2, snap => resolve(snap.val()), { onlyOnce: true });
    });
    if(!recSnap) return;

    const hoje2 = new Date();
    const diaSemana = hoje2.getDay(); // 0=dom, 1=seg...
    const diaMes = hoje2.getDate();

    const recorrentes = Object.values(recSnap).filter(r => {
      if(!r || !r.active) return false;
      if(r.frequency === "daily") return true;
      if(r.frequency === "weekly") return r.dayOfWeek === diaSemana;
      if(r.frequency === "monthly") return r.dayOfMonth === diaMes;
      return false;
    });

    // Verifica tarefas recorrentes já existentes hoje (evita duplicata)
    const tasksSnap = await new Promise(resolve => {
      onValue(ref(db, "/tasks"), snap => resolve(snap.val()), { onlyOnce: true });
    });
    const existingTexts = Object.values(tasksSnap || {})
      .filter(t => t && t.isRecorrente)
      .map(t => t.text?.toLowerCase());

    // Cria as tarefas do dia
    for(const rec of recorrentes) {
      // Pula se já existe
      if(existingTexts.includes(rec.text?.toLowerCase())) continue;
      await push(ref(db, "/tasks"), {
        member: rec.member || "Diogo",
        text: rec.text,
        prio: rec.prio || "importante",
        done: false,
        progress: false,
        delegatedBy: null,
        isRecorrente: true,
        recorrenteId: rec.id || null,
        frequency: rec.frequency,
        createdAt: Date.now(),
      });
    }

    // Registra log do dia ANTES de criar (evita race condition)
    await set(ref(db, logKey), { createdAt: new Date().toISOString(), count: recorrentes.length });
    console.log(`Recorrentes criadas: ${recorrentes.length}`);
  } catch(e) {
    console.error("Erro ao criar recorrentes:", e.message);
  }
}

let nfCheckDone = false;

  await push(ref(db, "/tasks"), {
    member: "Diogo",
    text: `NF de transferência gerada — NF #${chave}`,

    done: false,

    subtarefas: [
      { texto: "Gerar complemento de IPI", feito: false },
      { texto: "Atualizar custos no envio Full", feito: false },
      { texto: "Gerar NF Full", feito: false },

      { texto: "Lançar Estoque Filial (Bling)", feito: false },
      { texto: "Lançar custos MT Filial", feito: false },
    ],
  });

async function checkTransferenciasNF() {
  if (nfCheckDone) return;
  nfCheckDone = true;
  try {
    const r = await fetch(`${BLING_PROXY}/api/bling-produtos?notas=1`);
    const data = await r.json();
    if (!r.ok || !data.transferencias) return;

    for (const nf of data.transferencias) {
      const chave = String(nf.numero || nf.id).replace(/[.#$\[\]\/]/g, "_"); // Firebase não aceita esses caracteres em chaves
      if (state.nfes_processadas?.[chave]) continue; // já criou tarefa pra essa nota
      await criarTarefaTransferencia(chave, { dataEmissao: nf.dataEmissao, natureza: nf.natureza, itens: nf.itens });
    }
  } catch (e) {
    console.error("Erro ao checar notas de transferência:", e.message);
  }
}

let processandoNotaManual = false;
async function processarNotaManual(numeroDigitado){
  const chave = String(numeroDigitado || "").trim().replace(/[.#$\[\]\/]/g, "_");
  if (!chave) return;
  if (state.nfes_processadas?.[chave]) {
    alert(`A nota ${chave} já foi processada antes — a tarefa dela já deve estar na sua lista (ou nas concluídas).`);
    return;
  }
  processandoNotaManual = true; render();
  try {
    const r = await fetch(`${BLING_PROXY}/api/bling-produtos?notaCompleta=${encodeURIComponent(chave)}`);
    const data = await r.json();
    if (!r.ok) { alert(`Não achei a nota ${chave}: ${data.error || "erro desconhecido"}`); return; }
    const corpo = data.data || data;
    const itensBrutos = corpo.itens || corpo.itensNota || [];
    const itens = itensBrutos.map(it => ({
      sku: it.codigo || null,
      produto: it.descricao || "",
      ncm: String(it.classificacaoFiscal || "").replace(/\D/g, ""),
      quantidade: Number(it.quantidade) || 0,
      valorUnit: Number(it.valor) || 0,
    })).filter(it => it.sku);
    await criarTarefaTransferencia(chave, {
      dataEmissao: corpo.dataEmissao || null,
      natureza: corpo.naturezaOperacao?.nome || null,
      itens,
      manual: true,
    });
  } catch (e) {
    alert("Erro ao processar a nota: " + e.message);
  }
  processandoNotaManual = false; render();
}

function extrairNumeroNFDaTarefa(task){
  if(task.nfNumero) return task.nfNumero;
  const m = String(task.text||"").match(/NF #(\S+)/);
  return m ? m[1] : null;
}

async function initCalcIpi(task, numeroManual){
  const chave = numeroManual || extrairNumeroNFDaTarefa(task);
  let nfData = state.nfes_processadas?.[chave];
  let erro = null;

  if(!nfData?.itens?.length && chave){
    calcIpiState[task.id] = { produtos: [], frete: 0, ipiOriginal: 0, carregando: true };
    render();
    try{
      const r = await fetch(`${BLING_PROXY}/api/bling-produtos?notaCompleta=${encodeURIComponent(chave)}`);
      const d = await r.json();
      if(r.ok && d?.data){
        const corpo = d.data;
        const itensBrutos = corpo.itens || corpo.itensNota || [];
        const itensExtraidos = itensBrutos.map(it => ({
          sku: it.codigo || null,
          produto: it.descricao || "",
          ncm: String(it.classificacaoFiscal || "").replace(/\D/g, ""),
          quantidade: Number(it.quantidade) || 0,
          valorUnit: Number(it.valor) || 0,
        })).filter(it => it.sku);
        if(!itensExtraidos.length){
          erro = `A nota #${chave} foi encontrada, mas nenhum item com SKU veio nela. Confere se o SKU está cadastrado nos produtos dessa nota no Bling.`;
        }
        nfData = { ...(nfData||{}), itens: itensExtraidos };
        set(ref(db, `/nfes_processadas/${chave}/itens`), itensExtraidos);
      }else{
        erro = d?.error || `Não achei a nota #${chave} no Bling (erro ${r.status}).`;
      }
    }catch(e){
      erro = `Erro de conexão ao buscar a nota #${chave}: ${e.message}`;
    }
  }else if(!chave){
    erro = "Não consegui identificar o número dessa NF a partir da tarefa. Digite o número manualmente abaixo.";
  }

  const itensNF = nfData?.itens || [];
  calcIpiState[task.id] = {
    produtos: itensNF.map(it => {
      const precoSalvo = state.precos_venda_manual?.[normSku(it.sku)];
      const precoRef = PRECOS_VENDA_REFERENCIA_NORM[normSku(it.sku)];
      const precoInicial = precoSalvo!=null ? precoSalvo : (precoRef!=null ? precoRef : null);
      const sugestao = getAliquotaIPI(it.ncm); // só usada como ponto de partida — sempre editável depois
      return {
        sku: it.sku, produto: it.produto, qtd: it.quantidade, valorNf: it.valorUnit,
        ncm: it.ncm, precoVenda: precoInicial, automatico: true,
        aliquotaValor: sugestao.conhecido ? sugestao.valor : null,
      };
    }),
    frete: 0, ipiOriginal: 0,
    erro: erro,
    nfUsada: chave,
  };
  render();
}

function calcularLinhaIpi(p){
  const precoVenda = p.precoVenda;
  if(precoVenda==null || !p.qtd) return { precoAjustado:0, baseUnit:0, baseTotal:0, ipi:0, aliquotaValor:p.aliquotaValor||0 };
  const aliquotaValor = p.aliquotaValor!=null ? p.aliquotaValor : 0;
  const precoAjustado = precoVenda * (1 - REDUCAO_IPI);
  const baseUnit = precoAjustado - p.valorNf;
  const baseTotal = baseUnit * p.qtd;
  const ipi = baseTotal * aliquotaValor;
  return { precoAjustado, baseUnit, baseTotal, ipi, aliquotaValor };
}

  addBtn.addEventListener("click", ()=>{ calc.produtos.push({sku:"",produto:"",qtd:0,valorNf:0,ncm:"",precoVenda:null,aliquotaValor:null,automatico:false}); render(); });
  wrap.appendChild(addBtn);

  const totalRow = document.createElement("div");
  totalRow.style.cssText = "margin-top:12px;padding-top:10px;border-top:1px solid var(--sep);display:flex;justify-content:space-between;align-items:center;";
  const totalSpan = document.createElement("span");
  totalSpan.style.cssText = "font-size:18px;font-weight:600;color:#00dfc3;";
  totalSpan.textContent = "R$ 0,00";
  totalRow.innerHTML = `<span style="font-size:9px;color:var(--text3);letter-spacing:1px;">TOTAL IPI E NOTA</span>`;
  totalRow.appendChild(totalSpan);
  wrap.appendChild(totalRow);

  function montarLinhas(){
    tbody.innerHTML = "";
    calc.produtos.forEach((p, i)=>{
      const tr = document.createElement("tr");
      tr.style.cssText = "border-bottom:1px solid var(--sep);cursor:pointer;";
      tr.dataset.prodIdx = i;

      const tdSku = document.createElement("td"); tdSku.style.cssText="padding:6px 3px;";
      const aliqTextoHtml = (val) => val==null
        ? `<span class="aliqBadge" style="color:#f87171;font-size:9px;">sem %</span>`
        : `<span class="aliqBadge" style="color:var(--text3);font-size:9px;">${(val*100).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}%</span>`;
      const seta = calc.linhaExpandida===i ? "▾" : "▸";
      if(p.automatico){
        tdSku.innerHTML = `<div style="color:#00dfc3;font-weight:600;">${p.sku} <span style="color:var(--border2);">·</span> ${aliqTextoHtml(p.aliquotaValor)} <span style="color:var(--text3);font-size:9px;">${seta}</span></div><div style="color:var(--text3);font-size:9.5px;margin-top:2px;">${p.produto||""}</div>`;
      }else{
        tdSku.innerHTML = `<div style="color:#00dfc3;font-weight:600;">· ${aliqTextoHtml(p.aliquotaValor)} <span style="color:var(--text3);font-size:9px;">${seta}</span></div>`;
        const inpSku=document.createElement("input"); inpSku.value=p.sku; inpSku.placeholder="SKU";
        inpSku.style.cssText="width:100px;background:var(--bg);border:1px solid var(--border2);border-radius:4px;padding:3px 5px;color:#00dfc3;font-family:inherit;font-size:11px;margin-top:2px;";
        inpSku.addEventListener("click",e=>e.stopPropagation());
        inpSku.addEventListener("input",()=>{p.sku=inpSku.value;});
        tdSku.insertBefore(inpSku, tdSku.firstChild.nextSibling);
      }
      tr.appendChild(tdSku);

      const tdQtd = document.createElement("td"); tdQtd.style.cssText="padding:6px 3px;text-align:center;";
      if(p.automatico){ tdQtd.textContent = p.qtd; }
      else{ const inpQtd=document.createElement("input"); inpQtd.type="number"; inpQtd.value=p.qtd; inpQtd.style.cssText="width:55px;background:var(--bg);border:1px solid var(--border2);border-radius:4px;padding:3px 5px;color:var(--text2);font-family:inherit;font-size:11px;text-align:center;"; inpQtd.addEventListener("click",e=>e.stopPropagation()); inpQtd.addEventListener("input",()=>{p.qtd=parseFloat(inpQtd.value)||0; recalcular();}); tdQtd.appendChild(inpQtd); }
      tr.appendChild(tdQtd);

      const tdValorNf = document.createElement("td"); tdValorNf.style.cssText="padding:6px 3px;text-align:right;";
      if(p.automatico){ tdValorNf.textContent = `R$ ${p.valorNf.toFixed(2)}`; }
      else{ const inpV=document.createElement("input"); inpV.type="number"; inpV.value=p.valorNf; inpV.style.cssText="width:60px;background:var(--bg);border:1px solid var(--border2);border-radius:4px;padding:3px 5px;color:var(--text2);font-family:inherit;font-size:11px;text-align:right;"; inpV.addEventListener("click",e=>e.stopPropagation()); inpV.addEventListener("input",()=>{p.valorNf=parseFloat(inpV.value)||0; recalcular();}); tdValorNf.appendChild(inpV); }
      tr.appendChild(tdValorNf);

      const tdPreco = document.createElement("td"); tdPreco.style.cssText="padding:6px 3px;text-align:right;";
      const inpPreco = document.createElement("input"); inpPreco.type="number"; inpPreco.placeholder="digitar";
      inpPreco.value = p.precoVenda!=null ? p.precoVenda.toFixed(2) : "";
      inpPreco.style.cssText=`width:70px;background:var(--bg);border:1px solid ${p.precoVenda==null?"#f87171":"var(--border2)"};border-radius:4px;padding:3px 5px;color:#fbbf24;font-family:inherit;font-size:11px;text-align:right;`;
      inpPreco.addEventListener("click",e=>e.stopPropagation());
      // Só recalcula localmente enquanto digita (sem gravar no Firebase a cada
      // tecla — isso disparava um recarregamento da tela inteira e derrubava
      // o foco do campo no meio da digitação). Só grava quando sai do campo.
      inpPreco.addEventListener("input",()=>{
        const v=parseFloat(inpPreco.value); p.precoVenda=isNaN(v)?null:v; recalcular();
      });
      inpPreco.addEventListener("blur",()=>{
        if(p.precoVenda!=null && p.sku) set(ref(db, `/precos_venda_manual/${normSku(p.sku)}`), p.precoVenda);
      });
      tdPreco.appendChild(inpPreco);
      tr.appendChild(tdPreco);

      const tdIpi = document.createElement("td"); tdIpi.className="celulaIpi"; tdIpi.style.cssText="padding:6px 3px;text-align:right;color:#00dfc3;";
      tr.appendChild(tdIpi);

      const tdCmv = document.createElement("td"); tdCmv.className="celulaCmv"; tdCmv.style.cssText="padding:6px 3px;text-align:right;color:#7F77DD;";
      tr.appendChild(tdCmv);

      const tdDel = document.createElement("td"); tdDel.style.cssText="padding:6px 3px;";
      if(!p.automatico){ const delBtn=document.createElement("button"); delBtn.textContent="×"; delBtn.style.cssText="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;"; delBtn.addEventListener("click",e=>{e.stopPropagation();calc.produtos.splice(i,1);render();}); tdDel.appendChild(delBtn); }
      tr.appendChild(tdDel);

      tr.addEventListener("click", ()=>{
        calc.linhaExpandida = calc.linhaExpandida===i ? null : i;
        montarLinhas();
        recalcular();
      });
      tbody.appendChild(tr);

      if(calc.linhaExpandida===i){
        const trDet = document.createElement("tr");
        trDet.style.cssText = "background:var(--bg);";
        const tdDet = document.createElement("td");
        tdDet.colSpan = 7;
        tdDet.style.cssText = "padding:10px 12px;";
        tdDet.innerHTML = `<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
          <div><div style="font-size:9px;color:var(--text3);margin-bottom:3px;">NCM</div><div style="font-size:11px;color:var(--text2);">${p.ncm||"—"}</div></div>
        </div>`;
        const campoAliq = document.createElement("div");
        const lblAliq = document.createElement("div"); lblAliq.style.cssText="font-size:9px;color:var(--text3);margin-bottom:3px;"; lblAliq.textContent="ALÍQUOTA %";
        const inpAliqDet = document.createElement("input"); inpAliqDet.type="number"; inpAliqDet.step="0.01"; inpAliqDet.placeholder="digitar";
        inpAliqDet.value = p.aliquotaValor!=null ? (p.aliquotaValor*100) : "";
        inpAliqDet.style.cssText = "width:80px;background:var(--bg3);border:1px solid #fbbf2466;border-radius:4px;padding:5px 8px;color:#fbbf24;font-family:inherit;font-size:12px;";
        inpAliqDet.addEventListener("click",e=>e.stopPropagation());
        inpAliqDet.addEventListener("input",()=>{
          const v=parseFloat(inpAliqDet.value);
          p.aliquotaValor=isNaN(v)?null:v/100;
          const badge = tr.querySelector(".aliqBadge");
          if(badge){
            if(p.aliquotaValor==null){ badge.style.color="#f87171"; badge.textContent="sem %"; }
            else{ badge.style.color="var(--text3)"; badge.textContent=`${(p.aliquotaValor*100).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}%`; }
          }
          recalcular();
        });
        campoAliq.appendChild(lblAliq); campoAliq.appendChild(inpAliqDet);
        tdDet.querySelector("div").appendChild(campoAliq);
        trDet.appendChild(tdDet);
        trDet.addEventListener("click", e=>e.stopPropagation());
        tbody.appendChild(trDet);
      }
    });

    // Rodapé: total de SKUs e total de unidades
    const totalUnidades = calc.produtos.reduce((s,p)=>s+(p.qtd||0),0);
    tfoot.innerHTML = `<tr style="border-top:1px solid var(--border2);">
      <td style="padding:8px 3px;color:var(--text2);font-size:10px;font-weight:600;">${calc.produtos.length} SKUs</td>
      <td style="padding:8px 3px;text-align:center;color:var(--text);font-size:10px;font-weight:600;">${totalUnidades.toLocaleString("pt-BR")} un.</td>
      <td colspan="5"></td>
    </tr>`;
  }

  function recalcular(){
    let total = 0;
    const porAliquota = new Map(); // valorAliquota -> {base, valor}
    const linhas = tbody.querySelectorAll("tr[data-prod-idx]");

    // Base de rateio (pra diluir frete + IPI da NF original proporcionalmente),
    // igual à planilha: soma valorNf*qtd de todos os produtos com qtd>0
    let baseRateio = 0;
    calc.produtos.forEach(p=>{ if(p.qtd>0) baseRateio += p.valorNf * p.qtd; });
    const totalDiluir = (calc.frete||0) + (calc.ipiOriginal||0);

    calc.produtos.forEach((p, i)=>{
      const r = calcularLinhaIpi(p);
      total += r.ipi;
      if(p.precoVenda!=null && p.qtd>0 && p.aliquotaValor!=null){
        const chaveAliq = p.aliquotaValor;
        if(!porAliquota.has(chaveAliq)) porAliquota.set(chaveAliq, {base:0, valor:0});
        const acc = porAliquota.get(chaveAliq);
        acc.base += r.baseTotal;
        acc.valor += r.ipi;
      }
      const celulaIpi = linhas[i]?.querySelector(".celulaIpi");
      if(celulaIpi) celulaIpi.textContent = (p.precoVenda!=null && p.aliquotaValor!=null) ? `R$ ${r.ipi.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}` : "—";

      const celulaCmv = linhas[i]?.querySelector(".celulaCmv");
      if(celulaCmv){
        if(p.precoVenda!=null && p.qtd>0 && baseRateio>0){
          const cmv = p.valorNf + (r.ipi/p.qtd) + (p.valorNf/baseRateio)*totalDiluir;
          celulaCmv.textContent = `R$ ${cmv.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
        }else{
          celulaCmv.textContent = "—";
        }
      }
    });

    cardsWrap.innerHTML = "";
    [...porAliquota.keys()].sort().forEach(aliq=>{
      const d = porAliquota.get(aliq);
      const card = document.createElement("div");
      card.style.cssText = "flex:1;min-width:130px;background:var(--bg);border-radius:8px;overflow:hidden;";
      card.innerHTML = `
        <div style="background:#000;padding:6px;text-align:center;font-size:10px;font-weight:600;color:#fff;">${(aliq*100).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}%</div>
        <div style="padding:7px;text-align:center;border-top:1px solid var(--sep);">
          <div style="font-size:9px;color:var(--text3);">BASE</div>
          <div style="font-size:12px;color:var(--text);">R$ ${d.base.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        </div>
        <div style="padding:7px;text-align:center;border-top:1px solid var(--sep);">
          <div style="font-size:9px;color:var(--text3);">VALOR</div>
          <div style="font-size:12px;color:#00dfc3;">R$ ${d.valor.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        </div>`;
      cardsWrap.appendChild(card);
    });

    const semAliquota = calc.produtos.filter(p=>p.precoVenda!=null && p.aliquotaValor==null).length;
    avisoBox.innerHTML = "";
    if(semAliquota>0){
      avisoBox.style.display="block";
      avisoBox.textContent = `⚠ ${semAliquota} produto(s) sem alíquota preenchida (campo em vermelho na tabela) — não entram no total até você preencher.`;
    }else{
      avisoBox.style.display="none";
    }
    const totalEl = totalSpan;
    if(totalEl) totalEl.textContent = `R$ ${total.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  }

  container.appendChild(wrap);
  montarLinhas();
  recalcular();

  // ── Seção Custo Médio Ponderado ───────────────────────────────
  // Estado de expansão do card CMP: 0=pequeno, 1=médio, 2=fullscreen
  if(window._cmpExpand === undefined) window._cmpExpand = 0;

  const cmpWrap = document.createElement("div");
  cmpWrap.style.cssText = "margin-top:16px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;";

  const cmpHeader = document.createElement("div");
  cmpHeader.style.cssText = "display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;";
  const cmpTitle = document.createElement("div");
  cmpTitle.style.cssText = "font-size:10px;color:var(--text3);letter-spacing:1.5px;";
  cmpTitle.textContent = "CUSTO MÉDIO PONDERADO — FILIAL SP";

  const cmpRightBtns = document.createElement("div");
  cmpRightBtns.style.cssText = "display:flex;gap:6px;align-items:center;";

  const cmpBuscarBtn = document.createElement("button");
  cmpBuscarBtn.textContent = "↻ Calcular CMP";
  cmpBuscarBtn.style.cssText = "background:none;border:1px solid #00dfc366;color:#00dfc3;border-radius:4px;padding:4px 12px;font-size:10px;cursor:pointer;font-family:inherit;";

  cmpRightBtns.appendChild(cmpBuscarBtn);
  cmpHeader.appendChild(cmpTitle); cmpHeader.appendChild(cmpRightBtns);
  cmpWrap.appendChild(cmpHeader);

  const cmpContent = document.createElement("div");
  cmpContent.style.cssText = "font-size:11px;color:var(--text3);";
  cmpContent.textContent = "Clique em ↻ Calcular CMP para buscar o custo atual da Filial e calcular o novo custo médio ponderado.";
  cmpWrap.appendChild(cmpContent);

  // Overlay fullscreen
  let fsOverlay = null;
  function aplicarExpansaoCmp() {
    expandBtn.textContent = ["⤢","⤡","✕"][window._cmpExpand];

    if(window._cmpExpand === 0) {
      // Pequeno — remove fullscreen se existir
      if(fsOverlay) { fsOverlay.remove(); fsOverlay = null; }
      cmpWrap.style.position = "";
      cmpWrap.style.zIndex = "";
      cmpWrap.style.top = "";
      cmpWrap.style.left = "";
      cmpWrap.style.width = "";
      cmpWrap.style.height = "";
      cmpWrap.style.borderRadius = "8px";
      cmpWrap.style.overflow = "";
    } else if(window._cmpExpand === 1) {
      // Médio — sem mudança visual, mas panel pai já é largo
      if(fsOverlay) { fsOverlay.remove(); fsOverlay = null; }
      cmpWrap.style.position = "";
      cmpWrap.style.zIndex = "";
    } else {
      // Fullscreen
      fsOverlay = document.createElement("div");
      fsOverlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;display:flex;align-items:center;justify-content:center;";
      fsOverlay.addEventListener("click", e => { if(e.target===fsOverlay){ window._cmpExpand=0; aplicarExpansaoCmp(); }});
      document.body.appendChild(fsOverlay);
      fsOverlay.appendChild(cmpWrap);
      cmpWrap.style.cssText = "background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:20px;width:90vw;max-height:85vh;overflow-y:auto;";
    }
  }

  cmpBuscarBtn.addEventListener("click", async () => {
    const produtosComCmv = calc.produtos.filter(p => p.precoVenda != null && p.qtd > 0);
    if (produtosComCmv.length === 0) { cmpContent.textContent = "Preencha os preços de venda primeiro."; return; }

    cmpBuscarBtn.textContent = "↻ Buscando...";
    cmpBuscarBtn.disabled = true;
    cmpContent.innerHTML = "";

    try {
      // Busca estoque atual da Filial via ML
      const rEstoque = await fetch(`${VERCEL_BACKEND}/api/ml-vendas?estoque=1`).then(r=>r.json());
      const estoquePorSku = {};
      (rEstoque.rows || []).forEach(r => {
        if(r.sku) estoquePorSku[r.sku.toLowerCase()] = r.aptas || 0;
      });

      // Busca custos salvos no Firebase (último CMP calculado por SKU)
      const custosSalvosSnap = await get(ref(db, "/custos_medios_filial"));
      const custosSalvos = custosSalvosSnap.val() || {};

      // Monta tabela editável
      const tbl = document.createElement("table");
      tbl.style.cssText = "width:100%;border-collapse:collapse;font-size:11px;";
      tbl.innerHTML = `<thead><tr style="border-bottom:1px solid var(--sep);">
        <th style="text-align:left;padding:6px 3px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1px;">SKU</th>
        <th style="text-align:right;padding:6px 3px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1px;">QTD NF</th>
        <th style="text-align:right;padding:6px 3px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1px;">CMV NF</th>
        <th style="text-align:right;padding:8px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1px;">ESTOQUE FILIAL</th>
        <th style="text-align:right;padding:8px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1px;">CUSTO ATUAL</th>
        <th style="text-align:right;padding:8px;font-size:9px;color:var(--text3);font-weight:400;letter-spacing:1px;">NOVO CMP</th>
      </tr></thead><tbody></tbody>`;
      const tbody2 = tbl.querySelector("tbody");

      // Estado local editável
      const linhasCmp = produtosComCmv.map(p => {
        const r = calcularLinhaIpi(p);
        const cmvUnit = p.valorNf + (r.ipi / p.qtd);
        const skuKey = (p.sku||"").toLowerCase();
        const custoSalvo = custosSalvos[skuKey]?.novoCmp ?? custosSalvos[p.sku]?.novoCmp ?? null;
        const estoqueAtual = estoquePorSku[skuKey] ?? 0;
        return { sku: p.sku, skuKey, qtd: p.qtd, cmvUnit, estoqueAtual, custoAtual: custoSalvo, novoCmp: null };
      });

      function calcNovoCmp(l) {
        if (l.custoAtual == null || l.custoAtual === "") return null;
        const ca = parseFloat(String(l.custoAtual).replace(",",".")) || 0;
        return (l.qtd * l.cmvUnit + l.estoqueAtual * ca) / (l.qtd + l.estoqueAtual);
      }

      function renderLinhasCmp() {
        tbody2.innerHTML = "";
        linhasCmp.forEach(l => {
          l.novoCmp = calcNovoCmp(l);
          const tr2 = document.createElement("tr");
          tr2.style.cssText = "border-bottom:1px solid var(--sep);";
          const fmt = v => v != null ? `R$ ${Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}` : "—";
          const semCusto = l.custoAtual == null || l.custoAtual === "";

          // Células fixas — visual igual à tabela de IPI acima
          const tdSku = document.createElement("td"); tdSku.style.cssText="padding:6px 3px;";
          tdSku.innerHTML = `<div style="color:#00dfc3;font-weight:600;">${l.sku||"—"}</div>`;
          const tdQtd = document.createElement("td"); tdQtd.style.cssText="padding:6px 3px;text-align:center;color:var(--text2);"; tdQtd.textContent=l.qtd;
          const tdCmv = document.createElement("td"); tdCmv.style.cssText="padding:6px 3px;text-align:right;color:#7F77DD;"; tdCmv.textContent=fmt(l.cmvUnit);
          const tdEst = document.createElement("td"); tdEst.style.cssText="padding:6px 3px;text-align:right;color:var(--text2);"; tdEst.textContent=l.estoqueAtual;

          // Custo atual — editável
          const tdCusto = document.createElement("td"); tdCusto.style.cssText="padding:6px 8px;text-align:right;";
          const iCusto = document.createElement("input");
          iCusto.type = "number";
          iCusto.value = l.custoAtual != null ? String(l.custoAtual).replace(".",",") : "";
          iCusto.placeholder = semCusto ? "⚠ preencher" : "";
          iCusto.style.cssText = `width:80px;background:none;border:none;border-bottom:1px solid ${semCusto?"#f8717166":"var(--border2)"};color:${semCusto?"#f87171":"#fbbf24"};font-family:inherit;font-size:11px;text-align:right;outline:none;padding:2px 4px;`;
          iCusto.addEventListener("input", () => {
            l.custoAtual = iCusto.value;
            iCusto.style.borderBottomColor = "var(--border2)";
            iCusto.style.color = "#fbbf24";
            l.novoCmp = calcNovoCmp(l);
            tdNovoCmp.textContent = fmt(l.novoCmp);
            tdNovoCmp.style.color = l.novoCmp ? "#4ade80" : "var(--text3)";
          });
          tdCusto.appendChild(iCusto);

          // Novo CMP
          const tdNovoCmp = document.createElement("td");
          tdNovoCmp.style.cssText = `padding:6px 3px;text-align:right;font-weight:600;color:${l.novoCmp?"#4ade80":"var(--text3)"};`;
          tdNovoCmp.textContent = fmt(l.novoCmp);

          tr2.appendChild(tdSku); tr2.appendChild(tdQtd); tr2.appendChild(tdCmv);
          tr2.appendChild(tdEst); tr2.appendChild(tdCusto); tr2.appendChild(tdNovoCmp);
          tbody2.appendChild(tr2);
        });
      }

      renderLinhasCmp();
      cmpContent.appendChild(tbl);

      // Botão salvar CMP
      const salvarCmpBtn = document.createElement("button");
      salvarCmpBtn.textContent = "✓ Salvar CMP";
      salvarCmpBtn.style.cssText = "margin-top:12px;background:none;border:1px solid #00dfc366;color:#00dfc3;border-radius:4px;padding:6px 16px;font-size:10px;cursor:pointer;font-family:inherit;letter-spacing:0.5px;";
      salvarCmpBtn.addEventListener("click", async () => {
        const updates = {};
        let algumVazio = false;
        linhasCmp.forEach(l => {
          if (!l.novoCmp) { algumVazio = true; return; }
          updates[l.skuKey] = {
            sku: l.sku,
            novoCmp: l.novoCmp,
            custoAtual: parseFloat(String(l.custoAtual).replace(",",".")) || 0,
            atualizadoEm: Date.now(),
            nfOrigem: calc.nfUsada || null,
          };
        });

async function fetchVendas(days) {
  vendasLoading=true; render();
  try {
    const token=state.ml_token?.access_token;
    if(!token){vendasData={error:"token ausente"};vendasLoading=false;render();return;}
    const r=await fetch(`${VERCEL_BACKEND}/api/ml-vendas?token=${token}&days=${days}`);
    vendasData=await r.json();
  }catch(e){vendasData={error:e.message};}
  vendasLoading=false; render();
}

async function processarPlanilhaML(file) {
  // Usa SheetJS para ler o Excel no browser
  const arrayBuffer = await file.arrayBuffer();
  const XLSX = await import("https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm");
  const wb = XLSX.read(arrayBuffer, { type: "array" });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

  // Encontra linha de header (tem "N.º de venda")
  let headerIdx = -1;
  for(let i=0; i<rows.length; i++) {
    if(rows[i].some(c => String(c||"").includes("N.º de venda"))) { headerIdx=i; break; }
  }
  if(headerIdx === -1) { alert("Formato de planilha não reconhecido"); return; }

  const headers = rows[headerIdx];
  const colTotal = headers.findIndex(h => String(h||"").includes("Total (BRL)"));
  const colStatus = headers.findIndex(h => String(h||"") === "Estado");
  const colTitulo = headers.findIndex(h => String(h||"").includes("Título do anúncio"));
  const colData = headers.findIndex(h => String(h||"").includes("Data da venda"));
  const colCancel = headers.findIndex(h => String(h||"").includes("Cancelamentos e reembolsos"));

  const dataRows = rows.slice(headerIdx+1).filter(r => r[colTotal] !== undefined && r[colTotal] !== "");
  const negItems = dataRows
    .filter(r => Number(r[colTotal]) < 0)
    .map(r => ({
      titulo: String(r[colTitulo]||"—").slice(0,50),
      status: String(r[colStatus]||"—"),
      data: r[colData] ? String(r[colData]).slice(0,10) : "—",
      total: Number(r[colTotal]),
      cancel: Number(r[colCancel]||0),
    }))
    .sort((a,b) => a.total - b.total);

  const totalNeg = negItems.reduce((s,i) => s + i.total, 0);

  diogoCustoData = {
    fileName: file.name,
    negCount: negItems.length,
    totalNeg: Math.round(totalNeg*100)/100,
    negItems,
  };
  render();
}

  if(!finData&&!finLoading&&state.ml_token?.access_token){
    fetchFinanceiro(finMonth);
  }

  // Seletor de mês
  const header=document.createElement("div");
  header.style.cssText="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;";

  const monthWrap=document.createElement("div");
  monthWrap.style.cssText="display:flex;align-items:center;gap:8px;";
  const prevBtn=document.createElement("button");
  prevBtn.textContent="‹";
  prevBtn.style.cssText=`background:none;border:1px solid var(--border2);color:var(--text2);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:16px;`;
  const monthLabel=document.createElement("span");
  monthLabel.style.cssText="font-size:11px;color:var(--text);letter-spacing:2px;";
  const [y,m]=finMonth.split("-");
  const monthNames=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  monthLabel.textContent=`${monthNames[Number(m)-1]} ${y}`;
  const nextBtn=document.createElement("button");
  nextBtn.textContent="›";
  nextBtn.style.cssText=`background:none;border:1px solid var(--border2);color:var(--text2);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:16px;`;

  prevBtn.addEventListener("click",()=>{
    const d=new Date(`${finMonth}-01`);d.setMonth(d.getMonth()-1);
    finMonth=d.toISOString().slice(0,7);finData=null;fetchFinanceiro(finMonth);
  });
  nextBtn.addEventListener("click",()=>{
    const d=new Date(`${finMonth}-01`);d.setMonth(d.getMonth()+1);
    finMonth=d.toISOString().slice(0,7);finData=null;fetchFinanceiro(finMonth);
  });

  monthWrap.appendChild(prevBtn);monthWrap.appendChild(monthLabel);monthWrap.appendChild(nextBtn);

  const refBtn=document.createElement("button");
  refBtn.style.cssText=`background:none;border:1px solid var(--border2);color:var(--text3);border-radius:4px;padding:4px 10px;font-size:10px;cursor:pointer;font-family:inherit;letter-spacing:1px;`;
  refBtn.textContent="↻ Atualizar";
  refBtn.addEventListener("click",()=>{finData=null;fetchFinanceiro(finMonth);});

  header.appendChild(monthWrap);header.appendChild(refBtn);
  panel.appendChild(header);

  if(finLoading){
    const loading=document.createElement("div");
    loading.style.cssText="text-align:center;padding:40px;color:var(--text3);font-size:12px;";
    loading.innerHTML='<span class="spinning">↻</span> Carregando...';
    panel.appendChild(loading);return;
  }

  if(!finData||finData.error){
    if(!state.ml_token?.access_token||finData?.error==="token ausente"){
      const msg=document.createElement("p");msg.style.cssText="font-size:11px;color:var(--text3);margin-bottom:12px;";msg.textContent="Conecte o Mercado Livre no card da Larissa.";panel.appendChild(msg);
    }else{
      const err=document.createElement("p");err.style.cssText="color:#f87171;font-size:12px;padding:20px 0;";err.textContent=finData?.error||"Erro ao carregar";panel.appendChild(err);
    }
    return;
  }

  // Card de total
  const totalCard=document.createElement("div");
  totalCard.style.cssText=`background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;`;
  const totalLabel=document.createElement("div");
  totalLabel.innerHTML=`<div style="font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:4px">CUSTO DE DEVOLUÇÕES</div><div style="font-size:9px;color:var(--text3);letter-spacing:1px">${finData.count} devoluções concluídas</div>`;
  const totalValue=document.createElement("div");
  totalValue.style.cssText=`font-size:22px;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:${finData.totalCost>0?"#f87171":"#4ade80"};`;
  totalValue.textContent=`-R$ ${finData.totalCost.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  totalCard.appendChild(totalLabel);totalCard.appendChild(totalValue);
  panel.appendChild(totalCard);

  if(!finData.data?.length){
    const empty=document.createElement("p");empty.style.cssText="color:#4ade80;text-align:center;padding:30px 0;font-size:13px;";empty.textContent="✓ Nenhuma devolução no período";panel.appendChild(empty);return;
  }

  // Lista de devoluções
  const grid=document.createElement("div");
  grid.style.cssText="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;";
  panel.appendChild(grid);

  finData.data.forEach(dev=>{
    const card=document.createElement("div");
    card.className="ml-card";
    const hasCost=dev.refundedAmount>0;
    card.style.borderLeftColor=hasCost?"#f87171":"#4ade80";
    card.style.borderLeftWidth="3px";

    const date=dev.closedAt?new Date(dev.closedAt).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"}):"—";

    card.innerHTML=`
      <div style="flex:1">
        <div style="font-size:12px;color:var(--text);margin-bottom:4px;line-height:1.4">${dev.product}</div>
        <div style="font-size:10px;color:var(--text3);margin-bottom:6px">
          ${dev.buyer} · <span style="color:var(--text3)">${date}</span>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span class="ml-badge" style="background:${hasCost?"#f8717122":"#4ade8022"};color:${hasCost?"#f87171":"#4ade80"};border:1px solid ${hasCost?"#f8717144":"#4ade8044"}">
            ${hasCost?`-R$ ${dev.refundedAmount.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}`:"R$ 0,00"}
          </span>
          <a href="${dev.permalink}" target="_blank" class="ml-link" style="margin-top:0">Ver →</a>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function renderMLInPanel(panel,color){
  const subTabs=document.createElement("div");subTabs.className="ml-subtabs";
  const tabs=[
    {id:"canceladas",label:"Canceladas",data:mlCanceladas},
    {id:"devolucoes",label:"Devoluções",data:mlDevolucoes},
    {id:"reclamacoes",label:"Reclamações",data:mlReclamacoes},
  ];
  const currentDataMap={canceladas:mlCanceladas,devolucoes:mlDevolucoes,reclamacoes:mlReclamacoes};
  if(!currentDataMap[mlSubTab]&&mlLoadingTab!==mlSubTab&&state.ml_token?.access_token){fetchMLData(mlSubTab);}
  tabs.forEach(t=>{
    const btn=document.createElement("button");btn.className="ml-subtab"+(mlSubTab===t.id?" active":"");
    let count=t.data?.data?.length;
    if(t.id==="devolucoes"&&t.data?.data){count=t.data.data.filter(d=>d.needsReview).length;}
    btn.innerHTML=t.label+(count>0?`<span class="badge">${count}</span>`:"");
    btn.addEventListener("click",()=>{mlSubTab=t.id;if(!t.data)fetchMLData(t.id);else render();});
    subTabs.appendChild(btn);
  });
  panel.appendChild(subTabs);

  const currentTab=tabs.find(t=>t.id===mlSubTab);
  const data=currentTab?.data;

  if(mlLoadingTab===mlSubTab){
    const loading=document.createElement("div");
    loading.style.cssText="text-align:center;padding:40px;color:var(--text3);font-size:12px;";
    loading.innerHTML='<span class="spinning">↻</span> Carregando...';
    panel.appendChild(loading);
    return;
  }

  if(!data){
    if(!state.ml_token?.access_token){
      const msg=document.createElement("p");msg.style.cssText="font-size:11px;color:var(--text3);margin-bottom:12px;line-height:1.6;";msg.textContent="Conecte sua conta do Mercado Livre para ver os dados.";panel.appendChild(msg);
      const btn=document.createElement("button");btn.className="ml-connect-btn";btn.textContent="Conectar Mercado Livre";btn.addEventListener("click",()=>{window.open(`${VERCEL_BACKEND}/api/ml-auth`,"_blank");});panel.appendChild(btn);
    }else{
      const loadBtn=document.createElement("button");loadBtn.className="ml-connect-btn";loadBtn.textContent=`↻ Carregar ${currentTab?.label}`;loadBtn.addEventListener("click",()=>fetchMLData(mlSubTab));panel.appendChild(loadBtn);
    }
    return;
  }

  if(data.error){
    if(data.error==="token ausente"||data.error.toLowerCase().includes("token")||data.error.toLowerCase().includes("not valid json")||data.error.toLowerCase().includes("unexpected")){
      const msg=document.createElement("p");msg.style.cssText="font-size:11px;color:var(--text3);margin-bottom:12px;line-height:1.6;";msg.textContent="Conecte sua conta do Mercado Livre para ver os dados.";panel.appendChild(msg);
      const btn=document.createElement("button");btn.className="ml-connect-btn";btn.textContent="Conectar Mercado Livre";btn.addEventListener("click",()=>{window.open(`${VERCEL_BACKEND}/api/ml-auth`,"_blank");});panel.appendChild(btn);
    }else{
      const err=document.createElement("p");err.style.cssText="color:#f87171;font-size:12px;padding:20px 0;";err.textContent=data.error;panel.appendChild(err);
    }
    return;
  }

  if(!data.data?.length){
    const empty=document.createElement("p");empty.style.cssText="color:#4ade80;text-align:center;padding:40px 0;font-size:13px;";empty.textContent="✓ Nenhum item encontrado";panel.appendChild(empty);
    return;
  }

  if(data.updated_at){
    const upd=document.createElement("div");upd.style.cssText="font-size:9px;color:var(--text3);margin-bottom:12px;";
    const displayCount = mlSubTab === "devolucoes" ? data.data.filter(d=>d.needsReview).length : data.data.length;
  upd.textContent=`${displayCount} itens · Atualizado: ${new Date(data.updated_at).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}`;
    panel.appendChild(upd);
  }

  const cardsGrid=document.createElement("div");
  cardsGrid.style.cssText="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;";
  panel.appendChild(cardsGrid);

  // Para devoluções: filtra só pendentes de revisão, resto mostra tudo
  const displayData = mlSubTab === "devolucoes"
    ? data.data.filter(d => d.needsReview)
    : data.data;

  if(mlSubTab === "devolucoes" && displayData.length === 0){
    const empty=document.createElement("p");empty.style.cssText="color:#4ade80;text-align:center;padding:30px 0;font-size:13px;";empty.textContent="✓ Nenhuma devolução pendente de revisão";panel.appendChild(empty);
    const refBtn2=document.createElement("button");refBtn2.style.cssText="margin-top:8px;background:none;border:1px solid var(--border2);color:var(--text3);border-radius:4px;padding:6px 14px;font-size:10px;cursor:pointer;font-family:inherit;letter-spacing:1px;width:100%;";refBtn2.textContent="↻ Atualizar";refBtn2.addEventListener("click",()=>fetchMLData(mlSubTab));panel.appendChild(refBtn2);return;
  }

  displayData.forEach(dev=>{
    const stageColors={"waiting_seller":"#f87171","seller":"#f87171","buyer":"#fbbf24","dispute":"#ff2222","resolved":"#4ade80"};
    const stageLabels={"waiting_seller":"Aguarda você","seller":"Aguarda você","buyer":"Aguarda comprador","dispute":"Em disputa","resolved":"Resolvida"};
    const sc=stageColors[dev.stage]||"#888";
    const sl=stageLabels[dev.stage]||dev.stage||dev.status;

    const card=document.createElement("div");card.className="ml-card";

    // Cor da borda pelo status de revisão
    let borderColor = sc;
    if(dev.needsReview) borderColor = "#fbbf24";
    if(dev.returnStatusKey === "dispute") borderColor = "#f87171";
    card.style.borderLeftColor=borderColor;card.style.borderLeftWidth="3px";

    // Badge de status
    let statusBadgeHtml="";
    if(dev.returnStatusLabel&&dev.returnStatusKey!=="default"){
      const rs=returnStatusStyle(dev.returnStatusKey);
      statusBadgeHtml=`<span class="ml-badge" style="background:${rs.bg};color:${rs.color};border:1px solid ${rs.border}">${dev.returnStatusLabel}</span>`;
    }else{
      statusBadgeHtml=`<span class="ml-badge" style="background:${sc}22;color:${sc};border:1px solid ${sc}44">${sl}</span>`;
    }

    // Badge de prazo
    let dueBadgeHtml="";
    let cardUrgent=false;
    if(dev.dueDate){
      try{
        const d=new Date(dev.dueDate);const today=new Date();
        today.setHours(0,0,0,0);d.setHours(0,0,0,0);
        const diff=Math.ceil((d-today)/(1000*60*60*24));
        if(diff<=0){
          cardUrgent=true;
          dueBadgeHtml=`<span class="ml-badge" style="background:#a3e63515;color:#a3e635;border:1px solid #a3e63533">até hoje</span>`;
        } else {
          const label=`até ${d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"})}`;
          dueBadgeHtml=`<span class="ml-badge" style="background:#38bdf815;color:#38bdf8;border:1px solid #38bdf833">${label}</span>`;
        }
      }catch{}
    }
    if(cardUrgent) card.style.animation="borderPulse 1.5s ease-in-out infinite";

    // Botões de ação para devoluções pendentes
    const actionBtnsId = `dev-actions-${dev.id}`;

    card.innerHTML=`
      <div style="flex:1">
        <div style="font-size:13px;color:var(--text);margin-bottom:4px;line-height:1.4">${dev.product}</div>
        <div style="font-size:10px;color:var(--text3);margin-bottom:6px">
          Comprador: <span style="color:var(--text2)">${dev.buyer}</span>
          ${dev.returnQty ? ` · <span style="color:var(--text2)">${Math.round(Number(dev.returnQty))} un.</span>` : ""}
          ${dev.valor?` · <span style="color:#fbbf24">R$ ${Number(dev.valor).toFixed(2)}</span>`:""}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:8px;">
          ${statusBadgeHtml}
          ${dueBadgeHtml}
        </div>
        ${dev.needsReview ? `<div id="${actionBtnsId}" style="display:flex;gap:6px;flex-wrap:wrap;">
          <button onclick="window._reviewDev('${dev.id}','ok')" style="background:#4ade8022;border:1px solid #4ade8066;color:#4ade80;border-radius:4px;padding:5px 12px;font-size:10px;cursor:pointer;font-family:inherit;letter-spacing:1px;">✓ Chegou ok</button>
          <button onclick="window._reviewDev('${dev.id}','fail')" style="background:#f8717122;border:1px solid #f8717166;color:#f87171;border-radius:4px;padding:5px 12px;font-size:10px;cursor:pointer;font-family:inherit;letter-spacing:1px;">✗ Reportar problema</button>
        </div>` : `<a href="${dev.permalink}" target="_blank" class="ml-link">Abrir no ML →</a>`}
      </div>`;
    cardsGrid.appendChild(card);
  });

  // Função global para revisar devolução
  window._reviewDev = async function(claimId, action) {
    const token = state.ml_token?.access_token;
    if (!token) return alert("Token não encontrado");
    const btn = document.querySelector(`#dev-actions-${claimId}`);
    if (btn) btn.innerHTML = '<span style="font-size:11px;color:var(--text3)">Processando...</span>';
    try {
      const r = await fetch(`${VERCEL_BACKEND}/api/ml-revisar`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, claim_id: claimId, action }),
      });
      const data = await r.json();
      if (data.ok) {
        if (btn) btn.innerHTML = `<span style="font-size:11px;color:#4ade80">✓ ${data.message}</span>`;
        // Atualiza a lista após 2s
        setTimeout(() => { mlDevolucoes = null; fetchMLData("devolucoes"); }, 2000);
      } else {
        if (btn) btn.innerHTML = `<span style="font-size:11px;color:#f87171">Erro: ${data.error}</span>`;
      }
    } catch(e) {
      if (btn) btn.innerHTML = `<span style="font-size:11px;color:#f87171">Erro: ${e.message}</span>`;
    }
  };

  const refBtn=document.createElement("button");
  refBtn.style.cssText="margin-top:16px;background:none;border:1px solid var(--border2);color:var(--text3);border-radius:4px;padding:6px 14px;font-size:10px;cursor:pointer;font-family:inherit;letter-spacing:1px;width:100%;";
  refBtn.textContent="↻ Atualizar";
  refBtn.addEventListener("click",()=>fetchMLData(mlSubTab));
  panel.appendChild(refBtn);
}

// ---- CHAT ASSISTENTE ----
function buildContext(memberName) {
  const tasks = tasksFor(memberName);
  const active = tasks.filter(t=>!t.done);
  const done = tasks.filter(t=>t.done);
  let ctx = `Membro: ${memberName}
`;
  ctx += `Tarefas ativas (${active.length}): ${active.map(t=>`"${t.text}" [${t.prio}]`).join(", ") || "nenhuma"}
`;
  ctx += `Tarefas concluídas hoje (${done.length}): ${done.map(t=>`"${t.text}"`).join(", ") || "nenhuma"}
`;

  if(memberName === "Diogo") {
    if(diogoDevolucoes?.data) {
      ctx += `
Devoluções do mês: ${diogoDevolucoes.count} devoluções, custo total R$ ${diogoDevolucoes.totalCost?.toFixed(2)}
`;
      const urgent = diogoDevolucoes.data.filter(d=>d.refundedAmount>0).length;
      ctx += `Com custo: ${urgent}
`;
    }
    if(mlReclamacoes?.data) {
      const aguarda = mlReclamacoes.data.filter(d=>d.stage==="waiting_seller"||d.returnStatusKey==="waiting");
      ctx += `
Reclamações abertas: ${mlReclamacoes.data.length} total, ${aguarda.length} aguardando você
`;
    }
    if(mlCanceladas?.data) {
      ctx += `Cancelamentos abertos: ${mlCanceladas.data.length}
`;
    }
    if(estoqueExcelData?.rows?.length) {
      const rows = estoqueExcelData.rows;
      let totalValor=0, totalAptas=0, semCusto=0;
      const enriched = rows.map(r=>{
        const custo = estoqueBlingData ? (estoqueBlingData[normSku(r.sku)]||0) : 0;
        const valor = custo * r.aptas;
        if(!custo) semCusto++;
        totalValor += valor; totalAptas += r.aptas;
        const vendas30 = r.vendas30||0;
        const dias = vendas30>0 ? Math.round(r.aptas/(vendas30/30)) : 999;
        return {...r, custo, valor, dias};
      });
      ctx += `
ESTOQUE Filial SP (ML Full): ${rows.length} SKUs, valor total R$ ${totalValor.toFixed(2)}, ${totalAptas} unidades aptas, ${semCusto} SKUs sem custo cadastrado no Bling
`;
      const parados = enriched.filter(r=>r.dias>=999 && r.aptas>0).slice(0,10);
      if(parados.length) ctx += `Sem venda nos últimos 30 dias (${parados.length}): ${parados.map(r=>r.sku).join(", ")}
`;
      const acabando = enriched.filter(r=>r.dias<=15 && r.aptas>0).sort((a,b)=>a.dias-b.dias).slice(0,10);
      if(acabando.length) ctx += `Estoque acabando rápido (<=15 dias de giro): ${acabando.map(r=>`${r.sku} (${r.dias}d)`).join(", ")}
`;
    } else {
      ctx += `
ESTOQUE Filial SP: nenhuma planilha importada ainda na aba Estoque.
`;
    }
    if(matrizRows?.length) {
      const totalValorM = matrizRows.reduce((s,r)=>s+r.valor,0);
      const totalQtyM = matrizRows.reduce((s,r)=>s+r.qty,0);
      ctx += `ESTOQUE Matriz RS: ${matrizRows.length} SKUs, valor total R$ ${totalValorM.toFixed(2)}, ${totalQtyM} unidades
`;
    }
  }
  if(memberName === "Larissa") {
    if(mlDevolucoes?.data) {
      const pendentes = mlDevolucoes.data.filter(d=>d.needsReview);
      ctx += `
Devoluções pendentes de revisão: ${pendentes.length}
`;
      pendentes.forEach(d=>{ ctx += `- ${d.product} (${d.buyer})${d.dueDate?`, prazo: ${new Date(d.dueDate).toLocaleDateString("pt-BR")}`:""})
`; });
    }
    if(mlReclamacoes?.data) {
      ctx += `
Reclamações abertas: ${mlReclamacoes.data.length}
`;
    }
  }
  return ctx;
}

function formatChatMsg(text) {
  const lines = text.split("\n");
  const out = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.trim() === "") {
      if (out.length > 0) out.push('<div style="height:16px;"></div>');
      continue;
    }
    if (/^---+$/.test(line.trim())) {
      out.push('<hr style="border:none;border-top:1px solid var(--border);margin:14px 0;">');
      continue;
    }
    const hMatch = line.match(/^#{1,3} (.+)$/);
    if (hMatch) {
      out.push('<div style="font-weight:500;color:var(--text);margin:14px 0 6px;">' + hMatch[1] + '</div>');
      continue;
    }
    const liMatch = line.match(/^[-•] (.+)$/);
    if (liMatch) {
      out.push('<div style="padding:4px 0 4px 12px;border-left:2px solid var(--border);margin:6px 0;color:var(--text2);">' + liMatch[1] + '</div>');
      continue;
    }
    const numMatch = line.match(/^(\d+)\.\s+(.+)$/);
    if (numMatch) {
      out.push('<div style="padding:4px 0 4px 12px;border-left:2px solid var(--border);margin:6px 0;color:var(--text2);"><strong style="color:var(--text);">' + numMatch[1] + '.</strong> ' + numMatch[2] + '</div>');
      continue;
    }
    let l = line
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code style="background:var(--bg2);padding:1px 5px;border-radius:3px;font-size:11px;font-family:monospace;">$1</code>');
    out.push('<div style="line-height:1.75;">' + l + '</div>');
  }
  return out.join("");
}

function renderChatModal(memberName, color) {
  const modal = document.getElementById(`chat-${memberName}`);
  if(!modal) return;
  const cs = chatState[memberName];
  if(!cs.open) { modal.classList.add("hidden"); return; }
  modal.classList.remove("hidden");
  modal.innerHTML = "";

  // Header
  const header = document.createElement("div");
  header.className = "chat-header";
  header.style.background = `${color}11`;
  header.innerHTML = `<div style="display:flex;align-items:center;gap:8px;"><span style="color:${color};font-size:14px;">✦</span><span style="font-size:11px;letter-spacing:2px;color:${color};">ASSISTENTE · ${memberName.toUpperCase()}</span></div>`;
  const closeBtn = document.createElement("button");
  closeBtn.textContent = "✕";
  closeBtn.style.cssText = "background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;";
  closeBtn.addEventListener("click", () => { cs.open=false; renderChatModal(memberName,color); });
  header.appendChild(closeBtn);
  modal.appendChild(header);

  // Messages
  const msgs = document.createElement("div");
  msgs.className = "chat-messages";
  msgs.id = `chat-msgs-${memberName}`;

  if(cs.messages.length === 0) {
    const welcome = document.createElement("div");
    welcome.className = "chat-bubble assistant";
    welcome.textContent = `Olá${memberName==="Diogo"?", Diogo":memberName==="Larissa"?", Lari":""} 👋 Como posso ajudar?`;
    msgs.appendChild(welcome);
  }

  cs.messages.forEach(msg => {
    const bubble = document.createElement("div");
    bubble.className = `chat-bubble ${msg.role}`;
    if(msg.role === "user") {

  if(cs.loading) {
    const typing = document.createElement("div");
    typing.className = "chat-typing";
    typing.innerHTML = '<span class="spinning">↻</span> Digitando...';
    msgs.appendChild(typing);
  }

  modal.appendChild(msgs);
  setTimeout(() => { msgs.scrollTop = msgs.scrollHeight; }, 50);

  // Input
  const inputRow = document.createElement("div");
  inputRow.className = "chat-input-row";
  const input = document.createElement("textarea");
  input.className = "chat-input";
  input.placeholder = "Mensagem...";

  const sendBtn = document.createElement("button");
  sendBtn.className = "chat-send";
  sendBtn.style.cssText = `background:${color};color:#000;`;
  sendBtn.textContent = "↑";
  sendBtn.disabled = cs.loading;

  const doSend = async () => {
    const text = input.value.trim();
    if(!text || cs.loading) return;
    input.value = ""; input.style.height="auto";
    cs.messages.push({ role:"user", content:text });
    cs.loading = true;
    renderChatModal(memberName, color);

    try {
      const r = await fetch(`${VERCEL_BACKEND}/api/claude-chat`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          member: memberName,
          message: text,
          history: cs.messages.slice(-10),
          context: buildContext(memberName),
        }),
      });
      let data;
      try { data = await r.json(); } catch { data = null; }
      if(!r.ok) {
        cs.messages.push({ role:"assistant", content: data?.error || `Erro ${r.status} no servidor. Tente uma pergunta mais curta ou tente de novo em instantes.` });
      } else {
        cs.messages.push({ role:"assistant", content: data?.reply || data?.error || "Erro" });
        if(Array.isArray(data?.actions)){
          data.actions.forEach(action=>{
            try{
              if(action.type==="criar_tarefa"){
                const {member:taskMember,text:taskText,prio:taskPrio}=action.input||{};
                if(taskMember&&taskText&&taskPrio){
                  const norm=s=>String(s||"").trim().toLowerCase();
                  const jaExiste=Object.values(state.tasks||{}).some(t=>t!=null&&!t.done&&t.member===taskMember&&norm(t.text)===norm(taskText));
                  if(jaExiste){
                    cs.messages.push({ role:"assistant", content:`Já existe uma tarefa igual ("${taskText}") pendente pra ${taskMember} — não criei de novo pra não duplicar.` });
                  }else{
                    addTask(taskMember,taskText,taskPrio,memberName);
                    cs.messages.push({ role:"assistant", content:`✓ Tarefa criada para ${taskMember}: "${taskText}" [${PRIO[taskPrio]?.label||taskPrio}]` });
                  }
                }
              }else if(action.type==="criar_tarefa_recorrente"){
                const {member:taskMember,text:taskText,prio:taskPrio,frequency,dayOfWeek,dayOfMonth}=action.input||{};
                if(taskMember&&taskText&&taskPrio&&frequency){
                  const norm=s=>String(s||"").trim().toLowerCase();
                  const jaExiste=Object.values(state.recorrentes||{}).some(r=>r!=null&&r.active&&r.member===taskMember&&norm(r.text)===norm(taskText));
                  if(jaExiste){
                    cs.messages.push({ role:"assistant", content:`Já existe uma tarefa recorrente igual ("${taskText}") ativa pra ${taskMember} — não criei de novo pra não duplicar.` });
                  }else{
                    push(ref(db,"/recorrentes"),{
                      member:taskMember,text:taskText,prio:taskPrio,frequency,
                      dayOfWeek:frequency==="weekly"?(dayOfWeek??null):null,
                      dayOfMonth:frequency==="monthly"?(dayOfMonth??null):null,
                      active:true,createdBy:memberName,createdAt:Date.now(),
                    });
                    const freqLabel={daily:"todo dia",weekly:"toda semana",monthly:"todo mês"}[frequency]||frequency;
                    cs.messages.push({ role:"assistant", content:`✓ Tarefa recorrente criada para ${taskMember}: "${taskText}" [${PRIO[taskPrio]?.label||taskPrio}] — ${freqLabel}` });
                  }
                }
              }
            }catch(err){console.error("Erro ao executar ação do Claude:",err);cs.messages.push({ role:"assistant", content:"Não consegui confirmar se a ação foi salva. Confere na lista de tarefas." });}
          });
        }
      }
    } catch(e) {
      cs.messages.push({ role:"assistant", content:"Erro de conexão. Tente novamente." });
    }
    cs.loading = false;
    renderChatModal(memberName, color);
  };

  sendBtn.addEventListener("click", doSend);
  input.addEventListener("keydown", e => { if(e.key==="Enter" && !e.shiftKey) { e.preventDefault(); doSend(); } });
  inputRow.appendChild(input); inputRow.appendChild(sendBtn);
  modal.appendChild(inputRow);
  setTimeout(()=>input.focus(), 100);
}

async function processarExcelEstoque(file) {
  const arrayBuffer = await file.arrayBuffer();
  const XLSX = await import("https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm");
  const wb = XLSX.read(arrayBuffer, { type: "array" });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });

  // SheetJS ignora col A vazia → índices deslocados -1
  // idx 2=SKU, idx 5=Produto, idx 17=Aptas, idx 15=Transf, idx 14=Pendente

  // Encontra primeira linha com SKU real em idx 2
  let startIdx = 0;
  for (let i = 0; i < raw.length; i++) {
    const v = String(raw[i][2] || "").trim();
    if (v && /[A-Za-z]/.test(v) && !["SKU","Código ML","Status","Boa","Total","Produto"].includes(v)) {
      startIdx = i;
      break;
    }
  }

  const dados = [];
  let lastSku = "";
  for (let i = startIdx; i < raw.length; i++) {
    const row   = raw[i];
    const sku     = String(row[2] || "").trim();
    const produto = String(row[5] || "").trim();

    // SKU vazio mas produto preenchido = célula mesclada no Excel
    // usa SKU da linha anterior ou gera um a partir do produto
    const skuReal = sku || lastSku + "_v2";
    if (sku) lastSku = sku;

    if (!produto) continue;

    const aptas    = Number(row[17]) || 0;
    const transf   = Number(row[15]) || 0;
    const pendente = Number(row[14]) || 0;

    // Só inclui se tem produto válido
    if (!skuReal) continue;

    // Agrega linhas com mesmo SKU (células mescladas aparecem em linhas separadas)
    const existing = dados.find(d => d.sku === skuReal);
    if (existing) {
      existing.aptas    += aptas;
      existing.transf   += transf;
      existing.pendente += pendente;
      existing.vendas30 = (existing.vendas30||0) + (Number(row[10])||0);
    } else {
      const vendas30 = Number(row[10]) || 0;
      dados.push({ sku: skuReal, produto, aptas, transf, pendente, vendas30 });
    }
  }

  estoqueExcelData = { fileName: file.name, rows: dados };
  if (!estoqueBlingData && !estoqueBlingLoading) await fetchBlingProdutos();
  render();
}

async function processarRelatorioMatriz(file) {
  const arrayBuffer = await file.arrayBuffer();
  const XLSX = await import("https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm");
  const wb = XLSX.read(arrayBuffer, { type: "array" });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
  const dados = [];
  for (let i = 1; i < raw.length; i++) {
    const row = raw[i];
    const sku = String(row[0] || "").trim();
    const produto = String(row[1] || "").trim();
    if (!produto || produto.toLowerCase().includes("totai")) continue;
    const parseNum = v => parseFloat(String(v||"0").replace(/\./g,"").replace(",",".")) || 0;
    const qty = Math.round(parseNum(row[3]));
    const custo = parseNum(row[4]);
    const valor = parseNum(row[5]);
    if (qty <= 0) continue; // só produtos com estoque positivo
    dados.push({ sku: sku || "—", produto, qty, custo, valor });
  }
  return dados;
}

let precoAutoCheckDone = false;

// ── Cancelamentos ML ──────────────────────────────────────────────────────────
let cancelamentosData = null;     // null = não carregado ainda, [] = carregado vazio
let cancelamentosLoading = false;
let cancelamentosErro = null;

async function fetchCancelamentos(forcar) {
  if (cancelamentosLoading) return;
  if (cancelamentosData !== null && !forcar) return;
  cancelamentosLoading = true; cancelamentosErro = null;
  try {
    const r = await fetch(`${VERCEL_BACKEND}/api/ml-canceladas`);
    const d = await r.json();
    if (!r.ok || !d.ok) throw new Error(d.error || "falha ao buscar cancelamentos");
    cancelamentosData = d.itens || [];
  } catch (e) {
    cancelamentosErro = e.message;
    cancelamentosData = [];
    console.error("Erro ao buscar cancelamentos:", e.message);
  }
  cancelamentosLoading = false;
  // Atualiza só o painel de cancelamentos diretamente, sem re-renderizar o card todo
  const painelAlvo = document.getElementById("cancelamentos-panel");
  if (painelAlvo) {
    painelAlvo.innerHTML = "";
    renderCancelamentos(painelAlvo);
  }
}

function renderCancelamentos(panel) {
  if (cancelamentosLoading || cancelamentosData === null) {
    const l = document.createElement("div");
    l.style.cssText = "text-align:center;padding:30px 0;font-size:12px;color:var(--text3);";
    l.innerHTML = '<span class="spinning">↻</span> Buscando cancelamentos no ML...';
    panel.appendChild(l); return;
  }

  const topRow = document.createElement("div");
  topRow.style.cssText = "display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;";
  const refreshBtn = document.createElement("button");
  refreshBtn.textContent = "↻ Atualizar";
  refreshBtn.style.cssText = "background:none;border:1px solid var(--border2);color:var(--text3);border-radius:4px;padding:4px 10px;font-size:10px;cursor:pointer;font-family:inherit;";
  refreshBtn.addEventListener("click", () => {
    cancelamentosData = null; // reseta pra forçar nova busca
    const p = document.getElementById("cancelamentos-panel");
    if(p){ p.innerHTML=""; renderCancelamentos(p); }
    fetchCancelamentos(true);
  });
  topRow.appendChild(refreshBtn);
  panel.appendChild(topRow);

  if (cancelamentosErro) {
    const err = document.createElement("div");
    err.style.cssText = "padding:10px;background:#f8717110;border:1px solid #f8717133;border-radius:5px;font-size:11px;color:#f87171;margin-bottom:12px;";
    err.textContent = `Erro: ${cancelamentosErro}`;
    panel.appendChild(err);
    return;
  }

  if (!cancelamentosData || cancelamentosData.length === 0) {
    const vazio = document.createElement("div");
    vazio.style.cssText = "text-align:center;padding:30px 0;font-size:12px;color:var(--text3);";
    vazio.textContent = cancelamentosData ? "Nenhum cancelamento encontrado no período." : "Clique em Atualizar para carregar.";
    panel.appendChild(vazio); return;
  }

  // 4 status — definição de cor, ícone e texto do badge
  const statusDefs = {
    nf_pendente:        { cor: "#f87171", texto: "Cancelar NF",          icone: "⚠" },
    devolucao_pendente: { cor: "#fbbf24", texto: "Devolução — processar", icone: "↩" },
    nf_cancelada:       { cor: "#00dfc3", texto: "NF cancelada",          icone: "✓" },
  };

  // Ordena: cancelar NF direto primeiro, depois devolução pendente, depois já ok
  const ordemStatus = { nf_pendente: 0, devolucao_pendente: 1, nf_cancelada: 2 };
  const filtrados = cancelamentosData.filter(it => it.status !== "sem_nf").sort((a, b) => {
    const ds = (ordemStatus[a.status] ?? 9) - (ordemStatus[b.status] ?? 9);
    if (ds !== 0) return ds;

let precoAutoCheckLoading = false;
let estoqueAutoCheckDone = false;
let estoqueAutoLoading = false;
let estoqueAutoErro = null;
async function fetchEstoqueAutomatico(forcar) {
  if (estoqueAutoLoading) return;
  if (estoqueAutoCheckDone && !forcar) return;
  const token = state.ml_token_filial?.access_token;
  if (!token) return;
  estoqueAutoLoading = true; estoqueAutoErro = null;
  try {
    const rEstoque = await fetch(`${VERCEL_BACKEND}/api/ml-vendas?token=${token}&estoque=1`);
    const dEstoque = await rEstoque.json();
    if (!rEstoque.ok || !dEstoque.rows) throw new Error(dEstoque.error || "falha ao buscar estoque do Full");

    const rVendas = await fetch(`${VERCEL_BACKEND}/api/ml-vendas?token=${token}&days=30`);
    const dVendas = await rVendas.json();
    const vendasPorSku = {};
    (dVendas.allProducts || []).forEach(p => {
      if (p.sku) vendasPorSku[String(p.sku).trim().toLowerCase().replace(/\s+/g,"")] = p.qty || 0;
    });

    const rows = dEstoque.rows.map(r => ({
      ...r,
      vendas30: vendasPorSku[String(r.sku).trim().toLowerCase().replace(/\s+/g,"")] || 0,
    }));

    estoqueExcelData = { fileName: "(automático via Mercado Livre Full)", rows, automatico: true };
  } catch (e) {
    estoqueAutoErro = e.message;
    console.error("Erro ao buscar estoque automático:", e.message);
  }
  estoqueAutoLoading = false;
  estoqueAutoCheckDone = true;
  if (window._diogotab === "estoque") render();
}

async function checkPriceChangesAuto() {
  if (precoAutoCheckDone || precoAutoCheckLoading) return;
  const token = state.ml_token_filial?.access_token;
  if (!token) return;
  precoAutoCheckLoading = true;
  try {
    const r = await fetch(`${VERCEL_BACKEND}/api/ml-vendas?token=${token}&prices=1`);
    const data = await r.json();
    if (!r.ok || !data.prices) { precoAutoCheckLoading = false; return; }

    const vendasPorSku = {};
    (estoqueExcelData?.rows || []).forEach(row => { vendasPorSku[row.sku] = row.vendas30 || 0; });

    data.prices.forEach(item => {
      const sku = item.sku;
      const precoAtual = Number(item.price);
      const conhecido = state.last_known_prices?.[sku];
      if (conhecido === undefined || conhecido === null) {
        // Primeira vez vendo esse SKU: só estabelece o preço base, sem gerar "mudança"
        set(ref(db, `/last_known_prices/${sku}`), precoAtual);
      } else if (Math.abs(Number(conhecido) - precoAtual) > 0.009) {
        // Preço mudou de verdade desde a última vez que verificamos
        set(ref(db, `/price_changes/${sku}`), {
          vendas30AtChange: vendasPorSku[sku] || 0,
          changedAt: Date.now(),
          changedBy: "automático",
          priceBefore: Number(conhecido),
          priceAfter: precoAtual,
        });
        set(ref(db, `/last_known_prices/${sku}`), precoAtual);
      }
    });
  } catch (e) {
    console.error("Erro na checagem automática de preço:", e.message);
  }
  precoAutoCheckLoading = false;
  precoAutoCheckDone = true;
  render();
}

async function fetchBlingProdutos() {
  estoqueBlingLoading = true;
  estoqueBlingErro = null;
  render();

  try {
    const r = await fetch(`${BLING_PROXY}/api/bling-produtos`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    if (data.erro) throw new Error(data.erro);

    // Monta mapa SKU → precoCusto
    const mapa = {};
    (data.data || []).forEach(p => {
      const sku = normSku(p.codigo);
      const custo = Number(p.precoCusto) || 0;
      if (sku) mapa[sku] = custo;
    });

    estoqueBlingData = mapa;
  } catch (e) {
    estoqueBlingErro = e.message;
  }

  estoqueBlingLoading = false;
  render();
}

    authBtn.addEventListener("click", () => window.open("https://digoo-backend.vercel.app/api/bling-auth", "_blank"));
    blingStatus.appendChild(authBtn);
  } else if (estoqueBlingData) {
    const count = Object.keys(estoqueBlingData).length;
